          class _AnimatedTrainerPanelState extends State<AnimatedTrainerPanel>
              with SingleTickerProviderStateMixin {
            late final AnimationController controller;

            @override
            void initState() {
              super.initState();
              controller = AnimationController(
                vsync: this,
                duration: const Duration(seconds: 2),
              )..repeat(reverse: true);
            }

            @override
            void dispose() {
              controller.dispose();
              super.dispose();
            }

            @override
            Widget build(BuildContext context) {
              return ClipRRect(
                borderRadius: BorderRadius.circular(24),
                child: Container(
                  decoration: const BoxDecoration(
                    gradient: LinearGradient(
                      colors: [Color(0xFF171717), Color(0xFF101010)],
                      begin: Alignment.topLeft,
                      end: Alignment.bottomRight,
                    ),
                  ),
                  child: Stack(
                    children: [
                      Positioned.fill(
                        child: widget.exercise.animationUrl.isEmpty
                            ? const SizedBox.shrink()
                            : Image.network(
                                widget.exercise.animationUrl,
                                fit: BoxFit.cover,
                                errorBuilder: (_, __, ___) => const SizedBox.shrink(),
                              ),
                      ),
                      Positioned.fill(
                        child: Container(
                          decoration: const BoxDecoration(
                            gradient: LinearGradient(
                              colors: [
                                Color(0xAA0B0B0B),
                                Color(0x440B0B0B),
                                Color(0xAA0B0B0B),
                              ],
                              begin: Alignment.topCenter,
                              end: Alignment.bottomCenter,
                            ),
                          ),
                        ),
                      ),
                      Center(
                        child: AnimatedBuilder(
                          animation: controller,
                          builder: (context, _) {
                            final t = controller.value;
                            return Transform.translate(
                              offset: Offset(0, math.sin(t * math.pi * 2) * 6),
                              child: CustomPaint(
                                size: const Size(170, 250),
                                painter: TrainerPainter(progress: t),
                              ),
                            );
                          },
                        ),
                      ),
                      Positioned(
                        left: 16,
                        right: 16,
                        bottom: 16,
                        child: Container(
                          padding: const EdgeInsets.all(14),
                          decoration: BoxDecoration(
                            color: Colors.black.withOpacity(0.35),
                            borderRadius: BorderRadius.circular(18),
                            border: Border.all(color: const Color(0x2239FF14)),
                          ),
                          child: Column(
                            crossAxisAlignment: CrossAxisAlignment.start,
                            children: [
                              Text(
                                widget.exercise.baseName,
                                style: const TextStyle(fontSize: 18, fontWeight: FontWeight.bold),
                              ),
                              const SizedBox(height: 4),
                              Text(
                                '${widget.exercise.category.label} • ${widget.exercise.difficulty.label}',
                                style: const TextStyle(color: Colors.white70),
                              ),
                            ],
                          ),
                        ),
                      ),
                    ],
                  ),
                ),
              );
            }
          }

          class TrainerPainter extends CustomPainter {
            final double progress;

            TrainerPainter({required this.progress});

            @override
            void paint(Canvas canvas, Size size) {
              final neon = Paint()
                ..color = const Color(0xFF39FF14)
                ..strokeWidth = 6
                ..style = PaintingStyle.stroke
                ..strokeCap = StrokeCap.round;

              final glow = Paint()
                ..color = const Color(0x5539FF14)
                ..strokeWidth = 16
                ..style = PaintingStyle.stroke
                ..strokeCap = StrokeCap.round
                ..maskFilter = const MaskFilter.blur(BlurStyle.normal, 10);

              final centerX = size.width / 2;
              final headCenter = Offset(centerX, 35);
              final torsoTop = Offset(centerX, 62);
              final torsoBottom = Offset(centerX, 140);

              final armSwing = math.sin(progress * math.pi * 2) * 20;
              final legSwing = math.cos(progress * math.pi * 2) * 18;

              final leftShoulder = Offset(centerX - 18, 76);
              final rightShoulder = Offset(centerX + 18, 76);
              final leftHand = Offset(centerX - 45 - armSwing, 120);
              final rightHand = Offset(centerX + 45 + armSwing, 120);

              final hipLeft = Offset(centerX - 12, 140);
              final hipRight = Offset(centerX + 12, 140);
              final leftFoot = Offset(centerX - 28 - legSwing, 220);
              final rightFoot = Offset(centerX + 28 + legSwing, 220);

              canvas.drawCircle(headCenter, 18, glow);
              canvas.drawCircle(headCenter, 18, neon);

              canvas.drawLine(torsoTop, torsoBottom, glow);
              canvas.drawLine(torsoTop, torsoBottom, neon);

              canvas.drawLine(leftShoulder, leftHand, glow);
              canvas.drawLine(rightShoulder, rightHand, glow);
              canvas.drawLine(leftShoulder, leftHand, neon);
              canvas.drawLine(rightShoulder, rightHand, neon);

              canvas.drawLine(hipLeft, leftFoot, glow);
              canvas.drawLine(hipRight, rightFoot, glow);
              canvas.drawLine(hipLeft, leftFoot, neon);
              canvas.drawLine(hipRight, rightFoot, neon);
            }

            @override
            bool shouldRepaint(covariant TrainerPainter oldDelegate) {
              return oldDelegate.progress != progress;
            }
          }

