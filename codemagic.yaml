workflows:
  android-build:
    name: Trink Ultimate Build
    max_build_duration: 45

    environment:
      flutter: stable

    scripts:
      - name: Create Flutter project
        script: |
          flutter create app --platforms=android --project-name trink_weight_loss --org com.trink

      - name: Replace main.dart
        script: |
          cd app
          cat > lib/main.dart << 'EOF'
          import 'dart:async';
          import 'dart:math' as math;
          import 'package:flutter/material.dart';

          void main() {
            runApp(const TrinkApp());
          }

          class TrinkApp extends StatelessWidget {
            const TrinkApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                title: 'Trink Weight Loss',
                theme: ThemeData(
                  brightness: Brightness.dark,
                  scaffoldBackgroundColor: const Color(0xFF090909),
                  useMaterial3: true,
                  colorScheme: const ColorScheme.dark(
                    primary: Color(0xFF39FF14),
                    secondary: Color(0xFF39FF14),
                    surface: Color(0xFF171717),
                  ),
                ),
                home: const MainShell(),
              );
            }
          }

          enum ExerciseCategory {
            abs('Abs'),
            legs('Legs'),
            glutes('Glutes'),
            arms('Arms'),
            shoulders('Shoulders'),
            chest('Chest'),
            back('Back'),
            fullBody('Full Body'),
            cardio('Cardio'),
            stretching('Stretching'),
            hiit('HIIT'),
            mobility('Mobility');

            const ExerciseCategory(this.label);
            final String label;
          }

          enum ExerciseDifficulty {
            beginner('Beginner'),
            intermediate('Intermediate'),
            advanced('Advanced');

            const ExerciseDifficulty(this.label);
            final String label;
          }

          enum MovementPattern {
            jumping,
            squat,
            push,
            plank,
            lunge,
            crunch,
            bridge,
            stretch,
            run,
            twist,
            kick,
            raise,
            generic,
          }

          MovementPattern resolvePattern(String baseName) {
            final name = baseName.toLowerCase();

            if (name.contains('jumping jack') || name.contains('burpee')) return MovementPattern.jumping;
            if (name.contains('squat')) return MovementPattern.squat;
            if (name.contains('push up') || name.contains('dip') || name.contains('pike')) return MovementPattern.push;
            if (name.contains('plank')) return MovementPattern.plank;
            if (name.contains('lunge')) return MovementPattern.lunge;
            if (name.contains('crunch')) return MovementPattern.crunch;
            if (name.contains('bridge')) return MovementPattern.bridge;
            if (name.contains('stretch') || name.contains('cat cow') || name.contains('hip opener')) return MovementPattern.stretch;
            if (name.contains('high knees') || name.contains('fast feet') || name.contains('mountain climbers')) return MovementPattern.run;
            if (name.contains('twist') || name.contains('skaters')) return MovementPattern.twist;
            if (name.contains('donkey kick') || name.contains('fire hydrant')) return MovementPattern.kick;
            if (name.contains('raise') || name.contains('arm circles') || name.contains('superman') || name.contains('bird dog')) return MovementPattern.raise;

            return MovementPattern.generic;
          }

          class Exercise {
            final String id;
            final String baseName;
            final String name;
            final String description;
            final ExerciseCategory category;
            final ExerciseDifficulty difficulty;
            final int durationSeconds;
            final int calories;
            final List<String> targetMuscles;

            const Exercise({
              required this.id,
              required this.baseName,
              required this.name,
              required this.description,
              required this.category,
              required this.difficulty,
              required this.durationSeconds,
              required this.calories,
              required this.targetMuscles,
            });

            String get formattedDuration {
              final minutes = durationSeconds ~/ 60;
              final seconds = durationSeconds % 60;
              if (minutes > 0 && seconds == 0) return '$minutes min';
              if (minutes > 0) return '$minutes min $seconds sec';
              return '$seconds sec';
            }
          }

          class WorkoutCollection {
            final String id;
            final String title;
            final String subtitle;
            final String goal;
            final ExerciseDifficulty difficulty;
            final List<Exercise> exercises;
            final bool isPremium;

            const WorkoutCollection({
              required this.id,
              required this.title,
              required this.subtitle,
              required this.goal,
              required this.difficulty,
              required this.exercises,
              required this.isPremium,
            });

            int get totalDuration =>
                exercises.fold(0, (sum, item) => sum + item.durationSeconds);

            int get totalCalories =>
                exercises.fold(0, (sum, item) => sum + item.calories);

            String get formattedDuration {
              final minutes = totalDuration ~/ 60;
              final seconds = totalDuration % 60;
              if (seconds == 0) return '$minutes min';
              return '$minutes min $seconds sec';
            }
          }

          class AppState extends ChangeNotifier {
            double currentWeight = 78.4;
            double targetWeight = 72.0;
            double dailyWaterGoal = 2.5;
            double waterToday = 1.2;
            bool isPremiumUnlocked = false;

            final List<double> weightHistory = [82.0, 81.2, 80.3, 79.5, 78.9, 78.4];
            final List<double> waterHistory = [1.5, 2.1, 2.3, 2.0, 1.8, 1.2];

            void addWater(double value) {
              waterToday = (waterToday + value).clamp(0, 10);
              notifyListeners();
            }

            void resetWater() {
              waterToday = 0;
              notifyListeners();
            }

            void updateWeight(double value) {
              currentWeight = value;
              weightHistory.add(value);
              notifyListeners();
            }

            void updateTargetWeight(double value) {
              targetWeight = value;
              notifyListeners();
            }

            void unlockPremiumDemo() {
              isPremiumUnlocked = true;
              notifyListeners();
            }

            double get remainingWeight => (currentWeight - targetWeight).clamp(0, 999);
            double get waterProgress =>
                dailyWaterGoal == 0 ? 0 : (waterToday / dailyWaterGoal).clamp(0, 1);
          }

          class ExerciseRepository {
            static final List<Exercise> allExercises = _buildExercises();

            static List<Exercise> _buildExercises() {
              final templates = <_Template>[
                _Template('Jumping Jacks', 'Classic cardio warm-up and fat burn.', ExerciseCategory.cardio, ['Full Body', 'Legs', 'Shoulders'], 18),
                _Template('Mountain Climbers', 'Core and cardio endurance builder.', ExerciseCategory.fullBody, ['Core', 'Shoulders', 'Legs'], 22),
                _Template('Plank Hold', 'Static core stability exercise.', ExerciseCategory.abs, ['Core', 'Shoulders'], 12),
                _Template('Bicycle Crunch', 'Dynamic abs and oblique movement.', ExerciseCategory.abs, ['Abs', 'Obliques'], 16),
                _Template('Leg Raises', 'Lower abdominal strengthening movement.', ExerciseCategory.abs, ['Lower Abs', 'Hip Flexors'], 13),
                _Template('Bodyweight Squat', 'Foundational lower-body strength exercise.', ExerciseCategory.legs, ['Quads', 'Glutes', 'Hamstrings'], 16),
                _Template('Jump Squat', 'Explosive leg movement for power.', ExerciseCategory.legs, ['Glutes', 'Quads', 'Calves'], 24),
                _Template('Forward Lunge', 'Balance and unilateral strength movement.', ExerciseCategory.legs, ['Quads', 'Glutes', 'Hamstrings'], 15),
                _Template('Reverse Lunge', 'Joint-friendly lunge variation.', ExerciseCategory.legs, ['Glutes', 'Quads', 'Hamstrings'], 15),
                _Template('Glute Bridge', 'Hip extension focused on glutes.', ExerciseCategory.glutes, ['Glutes', 'Hamstrings'], 11),
                _Template('Donkey Kick', 'Glute shaping activation movement.', ExerciseCategory.glutes, ['Glutes'], 10),
                _Template('Fire Hydrant', 'Outer glute and hip activation.', ExerciseCategory.glutes, ['Glutes', 'Hips'], 10),
                _Template('Push Up', 'Classic upper-body bodyweight exercise.', ExerciseCategory.chest, ['Chest', 'Triceps', 'Shoulders'], 16),
                _Template('Knee Push Up', 'Beginner-friendly chest press.', ExerciseCategory.chest, ['Chest', 'Triceps'], 11),
                _Template('Pike Push Up', 'Bodyweight shoulder pressing movement.', ExerciseCategory.shoulders, ['Shoulders', 'Triceps'], 17),
                _Template('Arm Circles', 'Shoulder warm-up and endurance drill.', ExerciseCategory.shoulders, ['Shoulders'], 8),
                _Template('Tricep Dip', 'Chair dip for triceps and shoulders.', ExerciseCategory.arms, ['Triceps', 'Shoulders'], 13),
                _Template('Superman Hold', 'Posterior chain movement for back and glutes.', ExerciseCategory.back, ['Lower Back', 'Glutes', 'Upper Back'], 9),
                _Template('Bird Dog', 'Core stability and posture exercise.', ExerciseCategory.back, ['Core', 'Lower Back', 'Glutes'], 9),
                _Template('Burpee', 'High-intensity full-body fat burn.', ExerciseCategory.hiit, ['Full Body'], 28),
                _Template('High Knees', 'Fast drill to elevate heart rate.', ExerciseCategory.hiit, ['Core', 'Legs'], 20),
                _Template('Fast Feet', 'Footwork cardio movement.', ExerciseCategory.cardio, ['Legs', 'Calves'], 18),
                _Template('Skaters', 'Lateral cardio drill for agility.', ExerciseCategory.cardio, ['Glutes', 'Legs', 'Core'], 19),
                _Template('Cat Cow Stretch', 'Spinal mobility recovery movement.', ExerciseCategory.stretching, ['Spine', 'Core'], 5),
                _Template('Hamstring Stretch', 'Back-of-leg recovery stretch.', ExerciseCategory.stretching, ['Hamstrings'], 4),
                _Template('Hip Opener', 'Mobility drill for hips.', ExerciseCategory.mobility, ['Hips', 'Glutes'], 6),
                _Template('Torso Twist', 'Rotational mobility for trunk and core.', ExerciseCategory.mobility, ['Core', 'Spine'], 6),
              ];

              final variations = <_Variation>[
                _Variation('Beginner', ExerciseDifficulty.beginner, 30, 1.0),
                _Variation('Intermediate', ExerciseDifficulty.intermediate, 45, 1.2),
                _Variation('Advanced', ExerciseDifficulty.advanced, 60, 1.5),
                _Variation('Quick Burn', ExerciseDifficulty.intermediate, 40, 1.15),
                _Variation('Endurance', ExerciseDifficulty.advanced, 90, 1.9),
                _Variation('Power', ExerciseDifficulty.advanced, 50, 1.35),
                _Variation('Lite', ExerciseDifficulty.beginner, 25, 0.85),
                _Variation('Tempo', ExerciseDifficulty.intermediate, 55, 1.25),
              ];

              final exercises = <Exercise>[];
              int index = 1;

              for (final template in templates) {
                for (final variation in variations) {
                  exercises.add(
                    Exercise(
                      id: 'ex_${index.toString().padLeft(3, '0')}',
                      baseName: template.baseName,
                      name: '${template.baseName} ${variation.suffix}',
                      description: template.description,
                      category: template.category,
                      difficulty: variation.difficulty,
                      durationSeconds: variation.durationSeconds,
                      calories: (template.calories * variation.multiplier).round(),
                      targetMuscles: template.muscles,
                    ),
                  );
                  index++;
                }
              }

              return exercises;
            }
          }

          class WorkoutRepository {
            static List<WorkoutCollection> buildCollections(List<Exercise> all) {
              final collections = <WorkoutCollection>[];
              final groupedByCategory = <ExerciseCategory, List<Exercise>>{};

              for (final category in ExerciseCategory.values) {
                groupedByCategory[category] =
                    all.where((e) => e.category == category).toList();
              }

              int idCounter = 1;

              for (final category in ExerciseCategory.values) {
                final list = groupedByCategory[category]!;
                for (int i = 0; i < 8; i++) {
                  final start = (i * 3) % list.length;
                  final bundle = <Exercise>[];
                  for (int j = 0; j < 8; j++) {
                    bundle.add(list[(start + j) % list.length]);
                  }
                  collections.add(
                    WorkoutCollection(
                      id: 'w_${idCounter.toString().padLeft(3, '0')}',
                      title: '${category.label} Program ${i + 1}',
                      subtitle: 'Focused ${category.label.toLowerCase()} routine',
                      goal: 'Improve ${category.label.toLowerCase()} performance',
                      difficulty: bundle.first.difficulty,
                      exercises: bundle,
                      isPremium: idCounter > 10,
                    ),
                  );
                  idCounter++;
                }
              }

              while (collections.length < 100) {
                final start = (collections.length * 7) % all.length;
                final bundle = <Exercise>[];
                for (int j = 0; j < 12; j++) {
                  bundle.add(all[(start + j) % all.length]);
                }
                collections.add(
                  WorkoutCollection(
                    id: 'w_${idCounter.toString().padLeft(3, '0')}',
                    title: 'Smart Mix Program ${collections.length + 1}',
                    subtitle: 'Auto-generated balanced workout',
                    goal: 'General fat burn and conditioning',
                    difficulty: bundle.first.difficulty,
                    exercises: bundle,
                    isPremium: idCounter > 10,
                  ),
                );
                idCounter++;
              }

              return collections.take(100).toList();
            }
          }

          class MainShell extends StatefulWidget {
            const MainShell({super.key});

            @override
            State<MainShell> createState() => _MainShellState();
          }

          class _MainShellState extends State<MainShell> {
            final appState = AppState();
            final allExercises = ExerciseRepository.allExercises;
            late final List<WorkoutCollection> collections =
                WorkoutRepository.buildCollections(allExercises);
            int currentIndex = 0;

            @override
            void initState() {
              super.initState();
              appState.addListener(_refresh);
            }

            @override
            void dispose() {
              appState.removeListener(_refresh);
              super.dispose();
            }

            void _refresh() {
              if (mounted) setState(() {});
            }

            @override
            Widget build(BuildContext context) {
              final pages = [
                HomePage(appState: appState, exerciseCount: allExercises.length, collections: collections),
                WorkoutCollectionsPage(appState: appState, collections: collections),
                ExerciseCatalogPage(exercises: allExercises),
                ProgressPage(appState: appState),
                PremiumPage(appState: appState),
              ];

              return Scaffold(
                body: SafeArea(child: pages[currentIndex]),
                bottomNavigationBar: NavigationBar(
                  selectedIndex: currentIndex,
                  backgroundColor: const Color(0xFF111111),
                  indicatorColor: const Color(0x2239FF14),
                  onDestinationSelected: (value) => setState(() => currentIndex = value),
                  destinations: const [
                    NavigationDestination(icon: Icon(Icons.home_outlined), selectedIcon: Icon(Icons.home), label: 'Home'),
                    NavigationDestination(icon: Icon(Icons.fitness_center_outlined), selectedIcon: Icon(Icons.fitness_center), label: 'Workouts'),
                    NavigationDestination(icon: Icon(Icons.grid_view_outlined), selectedIcon: Icon(Icons.grid_view), label: 'Exercises'),
                    NavigationDestination(icon: Icon(Icons.show_chart_outlined), selectedIcon: Icon(Icons.show_chart), label: 'Progress'),
                    NavigationDestination(icon: Icon(Icons.workspace_premium_outlined), selectedIcon: Icon(Icons.workspace_premium), label: 'Premium'),
                  ],
                ),
              );
            }
          }

          class HomePage extends StatelessWidget {
            final AppState appState;
            final int exerciseCount;
            final List<WorkoutCollection> collections;

            const HomePage({
              super.key,
              required this.appState,
              required this.exerciseCount,
              required this.collections,
            });

            @override
            Widget build(BuildContext context) {
              return ListView(
                padding: const EdgeInsets.all(16),
                children: [
                  Row(
                    children: const [
                      CircleAvatar(
                        radius: 26,
                        backgroundColor: Color(0x2239FF14),
                        child: Icon(Icons.sports_gymnastics, color: Color(0xFF39FF14), size: 30),
                      ),
                      SizedBox(width: 12),
                      Expanded(
                        child: Text(
                          'Trink Weight Loss',
                          style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold),
                        ),
                      ),
                    ],
                  ),
                  const SizedBox(height: 8),
                  const Text(
                    'Ultimate build: workouts, progress, premium, animated coaching',
                    style: TextStyle(color: Colors.white70),
                  ),
                  const SizedBox(height: 18),
                  _heroCard(
                    icon: Icons.flag,
                    title: 'Goal',
                    subtitle: '${appState.remainingWeight.toStringAsFixed(1)} kg remaining',
                    trailing: '${appState.currentWeight.toStringAsFixed(1)} kg',
                  ),
                  const SizedBox(height: 16),
                  Row(
                    children: [
                      Expanded(child: _statCard(Icons.grid_view, 'Exercises', '$exerciseCount')),
                      const SizedBox(width: 12),
                      Expanded(child: _statCard(Icons.view_list, 'Programs', '${collections.length}')),
                    ],
                  ),
                  const SizedBox(height: 12),
                  Row(
                    children: [
                      Expanded(child: _statCard(Icons.water_drop, 'Water', '${appState.waterToday.toStringAsFixed(1)} / ${appState.dailyWaterGoal.toStringAsFixed(1)} L')),
                      const SizedBox(width: 12),
                      Expanded(child: _statCard(Icons.workspace_premium, 'Premium', appState.isPremiumUnlocked ? 'Unlocked' : 'Locked')),
                    ],
                  ),
                  const SizedBox(height: 20),
                  const Text('Quick Actions', style: TextStyle(fontSize: 22, fontWeight: FontWeight.bold)),
                  const SizedBox(height: 10),
                  Wrap(
                    spacing: 10,
                    runSpacing: 10,
                    children: [
                      _actionChip(context, 'Add 250 ml', () => appState.addWater(0.25)),
                      _actionChip(context, 'Add 500 ml', () => appState.addWater(0.5)),
                      _actionChip(context, 'Weight -0.2', () => appState.updateWeight((appState.currentWeight - 0.2).clamp(30, 300))),
                    ],
                  ),
                  const SizedBox(height: 20),
                  const Text('Featured Programs', style: TextStyle(fontSize: 22, fontWeight: FontWeight.bold)),
                  const SizedBox(height: 10),
                  ...collections.take(5).map((c) => _programTile(context, c, appState)),
                ],
              );
            }

            Widget _heroCard({
              required IconData icon,
              required String title,
              required String subtitle,
              required String trailing,
            }) {
              return Container(
                padding: const EdgeInsets.all(18),
                decoration: BoxDecoration(
                  color: const Color(0xFF171717),
                  borderRadius: BorderRadius.circular(24),
                  border: Border.all(color: const Color(0x2239FF14)),
                ),
                child: Row(
                  children: [
                    Container(
                      width: 58,
                      height: 58,
                      decoration: const BoxDecoration(
                        color: Color(0x2239FF14),
                        shape: BoxShape.circle,
                      ),
                      child: Icon(icon, color: const Color(0xFF39FF14)),
                    ),
                    const SizedBox(width: 14),
                    Expanded(
                      child: Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Text(title, style: const TextStyle(fontSize: 20, fontWeight: FontWeight.bold)),
                          const SizedBox(height: 4),
                          Text(subtitle, style: const TextStyle(color: Colors.white70)),
                        ],
                      ),
                    ),
                    Text(
                      trailing,
                      style: const TextStyle(color: Color(0xFF39FF14), fontWeight: FontWeight.bold, fontSize: 22),
                    ),
                  ],
                ),
              );
            }

            Widget _statCard(IconData icon, String title, String value) {
              return Container(
                padding: const EdgeInsets.all(16),
                decoration: BoxDecoration(
                  color: const Color(0xFF171717),
                  borderRadius: BorderRadius.circular(20),
                  border: Border.all(color: const Color(0x2239FF14)),
                ),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    Icon(icon, color: const Color(0xFF39FF14)),
                    const SizedBox(height: 12),
                    Text(title, style: const TextStyle(color: Colors.white70)),
                    const SizedBox(height: 4),
                    Text(value, style: const TextStyle(fontSize: 18, fontWeight: FontWeight.bold)),
                  ],
                ),
              );
            }

            Widget _actionChip(BuildContext context, String text, VoidCallback onTap) {
              return ActionChip(
                backgroundColor: const Color(0x2239FF14),
                label: Text(text),
                onPressed: onTap,
              );
            }

            Widget _programTile(BuildContext context, WorkoutCollection collection, AppState appState) {
              final locked = collection.isPremium && !appState.isPremiumUnlocked;
              return InkWell(
                onTap: () {
                  if (locked) {
                    Navigator.push(
                      context,
                      MaterialPageRoute(builder: (_) => PremiumPage(appState: appState)),
                    );
                  } else {
                    Navigator.push(
                      context,
                      MaterialPageRoute(builder: (_) => WorkoutDetailPage(collection: collection)),
                    );
                  }
                },
                child: Container(
                  margin: const EdgeInsets.only(bottom: 12),
                  padding: const EdgeInsets.all(16),
                  decoration: BoxDecoration(
                    color: const Color(0xFF171717),
                    borderRadius: BorderRadius.circular(20),
                    border: Border.all(color: locked ? Colors.amber : const Color(0x2239FF14)),
                  ),
                  child: Row(
                    children: [
                      CircleAvatar(
                        backgroundColor: locked ? const Color(0x22FFC107) : const Color(0x2239FF14),
                        child: Icon(locked ? Icons.lock : Icons.play_arrow, color: locked ? Colors.amber : const Color(0xFF39FF14)),
                      ),
                      const SizedBox(width: 12),
                      Expanded(
                        child: Column(
                          crossAxisAlignment: CrossAxisAlignment.start,
                          children: [
                            Text(collection.title, style: const TextStyle(fontSize: 17, fontWeight: FontWeight.bold)),
                            const SizedBox(height: 4),
                            Text(collection.subtitle, style: const TextStyle(color: Colors.white70)),
                          ],
                        ),
                      ),
                      if (locked)
                        const Icon(Icons.workspace_premium, color: Colors.amber)
                      else
                        const Icon(Icons.chevron_right, color: Colors.white54),
                    ],
                  ),
                ),
              );
            }
          }

          class WorkoutCollectionsPage extends StatelessWidget {
            final AppState appState;
            final List<WorkoutCollection> collections;

            const WorkoutCollectionsPage({
              super.key,
              required this.appState,
              required this.collections,
            });

            @override
            Widget build(BuildContext context) {
              return ListView(
                padding: const EdgeInsets.all(16),
                children: [
                  const Text('Workout Collections', style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold)),
                  const SizedBox(height: 6),
                  Text('${collections.length} programs available', style: const TextStyle(color: Colors.white70)),
                  const SizedBox(height: 16),
                  ...collections.map(
                    (collection) {
                      final locked = collection.isPremium && !appState.isPremiumUnlocked;
                      return InkWell(
                        onTap: () {
                          if (locked) {
                            Navigator.push(
                              context,
                              MaterialPageRoute(builder: (_) => PremiumPage(appState: appState)),
                            );
                          } else {
                            Navigator.push(
                              context,
                              MaterialPageRoute(builder: (_) => WorkoutDetailPage(collection: collection)),
                            );
                          }
                        },
                        child: Container(
                          margin: const EdgeInsets.only(bottom: 12),
                          padding: const EdgeInsets.all(16),
                          decoration: BoxDecoration(
                            color: const Color(0xFF171717),
                            borderRadius: BorderRadius.circular(20),
                            border: Border.all(color: locked ? Colors.amber : const Color(0x2239FF14)),
                          ),
                          child: Column(
                            crossAxisAlignment: CrossAxisAlignment.start,
                            children: [
                              Row(
                                children: [
                                  Expanded(
                                    child: Text(collection.title, style: const TextStyle(fontSize: 18, fontWeight: FontWeight.bold)),
                                  ),
                                  if (locked)
                                    const Icon(Icons.workspace_premium, color: Colors.amber),
                                ],
                              ),
                              const SizedBox(height: 4),
                              Text(collection.subtitle, style: const TextStyle(color: Colors.white70)),
                              const SizedBox(height: 10),
                              Wrap(
                                spacing: 8,
                                runSpacing: 8,
                                children: [
                                  _chip(collection.goal),
                                  _chip(collection.difficulty.label),
                                  _chip(collection.formattedDuration),
                                  _chip('${collection.totalCalories} kcal'),
                                  if (locked) _chip('Premium'),
                                ],
                              ),
                            ],
                          ),
                        ),
                      );
                    },
                  ),
                ],
              );
            }

            Widget _chip(String label) {
              return Container(
                padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 8),
                decoration: BoxDecoration(
                  color: const Color(0x2239FF14),
                  borderRadius: BorderRadius.circular(16),
                ),
                child: Text(label),
              );
            }
          }

          class ExerciseCatalogPage extends StatelessWidget {
            final List<Exercise> exercises;

            const ExerciseCatalogPage({super.key, required this.exercises});

            @override
            Widget build(BuildContext context) {
              return ListView(
                padding: const EdgeInsets.all(16),
                children: [
                  const Text('Exercise Catalog', style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold)),
                  const SizedBox(height: 6),
                  Text('${exercises.length} exercises ready', style: const TextStyle(color: Colors.white70)),
                  const SizedBox(height: 16),
                  ...exercises.map(
                    (exercise) => InkWell(
                      onTap: () {
                        Navigator.push(
                          context,
                          MaterialPageRoute(builder: (_) => ExerciseDetailPage(exercise: exercise)),
                        );
                      },
                      child: Container(
                        margin: const EdgeInsets.only(bottom: 12),
                        padding: const EdgeInsets.all(16),
                        decoration: BoxDecoration(
                          color: const Color(0xFF171717),
                          borderRadius: BorderRadius.circular(20),
                          border: Border.all(color: const Color(0x2239FF14)),
                        ),
                        child: Row(
                          children: [
                            const CircleAvatar(
                              backgroundColor: Color(0x2239FF14),
                              child: Icon(Icons.fitness_center, color: Color(0xFF39FF14)),
                            ),
                            const SizedBox(width: 12),
                            Expanded(
                              child: Column(
