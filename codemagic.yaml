          class _SingleExerciseRunnerPageState extends State<SingleExerciseRunnerPage> {
            Timer? timer;
            late int remainingSeconds;
            bool running = false;
            bool finished = false;

            @override
            void initState() {
              super.initState();
              remainingSeconds = widget.exercise.durationSeconds;
            }

            @override
            void dispose() {
              timer?.cancel();
              super.dispose();
            }

            void start() {
              if (running) return;
              running = true;
              timer = Timer.periodic(const Duration(seconds: 1), (timer) {
                if (!mounted) return;
                setState(() {
                  if (remainingSeconds > 0) {
                    remainingSeconds--;
                  } else {
                    timer.cancel();
                    running = false;
                    finished = true;
                  }
                });
              });
            }

            void pause() {
              timer?.cancel();
              running = false;
              setState(() {});
            }

            String formatSeconds(int seconds) {
              final minutes = seconds ~/ 60;
              final remain = seconds % 60;
              return '${minutes.toString().padLeft(2, '0')}:${remain.toString().padLeft(2, '0')}';
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text(widget.exercise.name)),
                body: Padding(
                  padding: const EdgeInsets.all(16),
                  child: finished
                      ? Container(
