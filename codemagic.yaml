          class _SingleExerciseRunnerPageState extends State<SingleExerciseRunnerPage> {
            Timer? timer;
            late int remainingSeconds;
            bool running = false;
            bool finished = false;

            @override
            void initState() {
              super.initState();
              remainingSeconds = widget.exercise.durationSeconds;
            }

            @override
            void dispose() {
              timer?.cancel();
              super.dispose();
            }

            void start() {
              if (running) return;
              running = true;
              timer = Timer.periodic(const Duration(seconds: 1), (timer) {
                if (!mounted) return;
                setState(() {
                  if (remainingSeconds > 0) {
                    remainingSeconds--;
                  } else {
                    timer.cancel();
                    running = false;
                    finished = true;
                  }
                });
              });
            }

            void pause() {
              timer?.cancel();
              running = false;
              setState(() {});
            }

            String formatSeconds(int seconds) {
              final minutes = seconds ~/ 60;
              final remain = seconds % 60;
              return '${minutes.toString().padLeft(2, '0')}:${remain.toString().padLeft(2, '0')}';
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text(widget.exercise.name)),
                body: Padding(
                  padding: const EdgeInsets.all(16),
                  child: finished
                      ? Container(
                          padding: const EdgeInsets.all(24),
                          decoration: BoxDecoration(
                            color: const Color(0xFF171717),
                            borderRadius: BorderRadius.circular(24),
                            border: Border.all(color: const Color(0x2239FF14)),
                          ),
                          child: Column(
                            mainAxisAlignment: MainAxisAlignment.center,
                            children: [
                              const Icon(Icons.check_circle, color: Color(0xFF39FF14), size: 72),
                              const SizedBox(height: 16),
                              const Text('Exercise Completed', style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold)),
                              const SizedBox(height: 8),
                              Text(widget.exercise.name),
                            ],
                          ),
                        )
                      : Column(
                          crossAxisAlignment: CrossAxisAlignment.stretch,
                          children: [
                            Expanded(child: AnimatedTrainerPanel(exercise: widget.exercise)),
                            const SizedBox(height: 16),
                            Text(
                              formatSeconds(remainingSeconds),
                              textAlign: TextAlign.center,
                              style: const TextStyle(fontSize: 48, fontWeight: FontWeight.w900, color: Color(0xFF39FF14)),
                            ),
                            const SizedBox(height: 16),
                            Wrap(
                              spacing: 10,
                              runSpacing: 10,
                              alignment: WrapAlignment.center,
                              children: [
                                FilledButton(
                                  style: FilledButton.styleFrom(backgroundColor: const Color(0xFF39FF14), foregroundColor: Colors.black),
                                  onPressed: start,
                                  child: const Text('Start'),
                                ),
                                OutlinedButton(onPressed: pause, child: const Text('Pause')),
                              ],
                            ),
                          ],
                        ),
                ),
              );
            }
          }

          class WorkoutRunnerPage extends StatefulWidget {
            final WorkoutCollection collection;

            const WorkoutRunnerPage({super.key, required this.collection});

            @override
            State<WorkoutRunnerPage> createState() => _WorkoutRunnerPageState();
          }

          class _WorkoutRunnerPageState extends State<WorkoutRunnerPage> {
            Timer? timer;
            int currentIndex = 0;
            late int remainingSeconds;
            bool started = false;
            bool completed = false;

            Exercise get currentExercise => widget.collection.exercises[currentIndex];

            @override
            void initState() {
              super.initState();
              remainingSeconds = widget.collection.exercises.first.durationSeconds;
            }

            @override
            void dispose() {
              timer?.cancel();
              super.dispose();
            }

            void startTimer() {
              if (started) return;
              started = true;
              timer = Timer.periodic(const Duration(seconds: 1), (timer) {
                if (!mounted) return;
                setState(() {
                  if (remainingSeconds > 0) {
                    remainingSeconds--;
                  } else {
                    nextExercise();
                  }
                });
              });
            }

            void pauseTimer() {
              timer?.cancel();
              timer = null;
              started = false;
              setState(() {});
            }

            void nextExercise() {
              if (currentIndex < widget.collection.exercises.length - 1) {
                currentIndex++;
                remainingSeconds = widget.collection.exercises[currentIndex].durationSeconds;
              } else {
                timer?.cancel();
                started = false;
                completed = true;
              }
            }

            void previousExercise() {
              if (currentIndex > 0) {
                currentIndex--;
                remainingSeconds = widget.collection.exercises[currentIndex].durationSeconds;
                completed = false;
              }
            }

            String formatSeconds(int seconds) {
              final minutes = seconds ~/ 60;
              final remain = seconds % 60;
              return '${minutes.toString().padLeft(2, '0')}:${remain.toString().padLeft(2, '0')}';
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text(widget.collection.title)),
                body: Padding(
                  padding: const EdgeInsets.all(16),
                  child: completed
                      ? Container(
                          padding: const EdgeInsets.all(24),
                          decoration: BoxDecoration(
                            color: const Color(0xFF171717),
                            borderRadius: BorderRadius.circular(24),
                            border: Border.all(color: const Color(0x2239FF14)),
                          ),
                          child: Column(
                            mainAxisAlignment: MainAxisAlignment.center,
                            children: [
                              const Icon(Icons.check_circle, color: Color(0xFF39FF14), size: 72),
                              const SizedBox(height: 16),
                              const Text('Workout Completed', style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold)),
                              const SizedBox(height: 8),
                              Text('You finished ${widget.collection.title}', textAlign: TextAlign.center, style: const TextStyle(color: Colors.white70)),
                              const SizedBox(height: 18),
                              Text('Total estimated calories: ${widget.collection.totalCalories} kcal', style: const TextStyle(fontSize: 18)),
                            ],
                          ),
                        )
                      : Column(
                          crossAxisAlignment: CrossAxisAlignment.stretch,
                          children: [
                            Expanded(child: AnimatedTrainerPanel(exercise: currentExercise)),
                            const SizedBox(height: 16),
                            Container(
                              padding: const EdgeInsets.all(18),
                              decoration: BoxDecoration(
                                color: const Color(0xFF171717),
                                borderRadius: BorderRadius.circular(24),
                                border: Border.all(color: const Color(0x2239FF14)),
                              ),
                              child: Column(
                                children: [
                                  Text('Exercise ${currentIndex + 1} / ${widget.collection.exercises.length}', style: const TextStyle(color: Colors.white70)),
                                  const SizedBox(height: 12),
                                  Text(currentExercise.name, textAlign: TextAlign.center, style: const TextStyle(fontSize: 24, fontWeight: FontWeight.bold)),
                                  const SizedBox(height: 8),
                                  Text(currentExercise.description, textAlign: TextAlign.center, style: const TextStyle(color: Colors.white70)),
                                  const SizedBox(height: 20),
                                  Text(
                                    formatSeconds(remainingSeconds),
                                    style: const TextStyle(fontSize: 48, fontWeight: FontWeight.w900, color: Color(0xFF39FF14)),
                                  ),
                                  const SizedBox(height: 16),
                                  Wrap(
                                    spacing: 10,
                                    runSpacing: 10,
                                    alignment: WrapAlignment.center,
                                    children: [
                                      FilledButton(
                                        style: FilledButton.styleFrom(backgroundColor: const Color(0xFF39FF14), foregroundColor: Colors.black),
                                        onPressed: startTimer,
                                        child: const Text('Start'),
                                      ),
                                      OutlinedButton(onPressed: pauseTimer, child: const Text('Pause')),
                                      OutlinedButton(onPressed: previousExercise, child: const Text('Previous')),
                                      OutlinedButton(
                                        onPressed: () => setState(() => nextExercise()),
                                        child: const Text('Next'),
                                      ),
                                    ],
                                  ),
                                ],
                              ),
                            ),
                          ],
                        ),
                ),
              );
            }
          }

          class AnimatedTrainerPanel extends StatefulWidget {
            final Exercise exercise;

            const AnimatedTrainerPanel({super.key, required this.exercise});

            @override
            State<AnimatedTrainerPanel> createState() => _AnimatedTrainerPanelState();
          }

          class _AnimatedTrainerPanelState extends State<AnimatedTrainerPanel>
              with SingleTickerProviderStateMixin {
            late final AnimationController controller;

            @override
            void initState() {
              super.initState();
              controller = AnimationController(
                vsync: this,
                duration: const Duration(milliseconds: 1800),
              )..repeat();
            }

            @override
            void dispose() {
              controller.dispose();
              super.dispose();
            }

            @override
            Widget build(BuildContext context) {
              final pattern = resolvePattern(widget.exercise.baseName);

              return ClipRRect(
                borderRadius: BorderRadius.circular(24),
                child: Container(
                  decoration: const BoxDecoration(
                    gradient: LinearGradient(
                      colors: [Color(0xFF171717), Color(0xFF101010)],
                      begin: Alignment.topLeft,
                      end: Alignment.bottomRight,
                    ),
                  ),
                  child: Stack(
                    children: [
                      Positioned.fill(
                        child: Container(
                          decoration: BoxDecoration(
                            gradient: RadialGradient(
                              colors: [
                                const Color(0x2239FF14),
                                Colors.transparent,
                              ],
                              radius: 0.85,
                              center: Alignment.topCenter,
                            ),
                          ),
                        ),
                      ),
                      Center(
                        child: AnimatedBuilder(
                          animation: controller,
                          builder: (context, _) {
                            return CustomPaint(
                              size: const Size(190, 270),
                              painter: HumanTrainerPainter(
                                progress: controller.value,
                                pattern: pattern,
                              ),
                            );
                          },
                        ),
                      ),
                      Positioned(
                        left: 16,
                        right: 16,
                        bottom: 16,
                        child: Container(
                          padding: const EdgeInsets.all(14),
                          decoration: BoxDecoration(
                            color: Colors.black.withOpacity(0.35),
                            borderRadius: BorderRadius.circular(18),
                            border: Border.all(color: const Color(0x2239FF14)),
                          ),
                          child: Column(
                            crossAxisAlignment: CrossAxisAlignment.start,
                            children: [
                              Text(widget.exercise.baseName, style: const TextStyle(fontSize: 18, fontWeight: FontWeight.bold)),
                              const SizedBox(height: 4),
                              Text(
                                '${widget.exercise.category.label} • ${widget.exercise.difficulty.label}',
                                style: const TextStyle(color: Colors.white70),
                              ),
                            ],
                          ),
                        ),
                      ),
                    ],
                  ),
                ),
              );
            }
          }

          class HumanTrainerPainter extends CustomPainter {
            final double progress;
            final MovementPattern pattern;

            HumanTrainerPainter({
              required this.progress,
              required this.pattern,
            });

            @override
            void paint(Canvas canvas, Size size) {
              final neon = Paint()
                ..color = const Color(0xFF39FF14)
                ..strokeWidth = 5.2
                ..style = PaintingStyle.stroke
                ..strokeCap = StrokeCap.round
                ..strokeJoin = StrokeJoin.round;

              final glow = Paint()
                ..color = const Color(0x5539FF14)
                ..strokeWidth = 13
                ..style = PaintingStyle.stroke
                ..strokeCap = StrokeCap.round
                ..strokeJoin = StrokeJoin.round
                ..maskFilter = const MaskFilter.blur(BlurStyle.normal, 10);

              final fill = Paint()
                ..color = const Color(0x1439FF14)
                ..style = PaintingStyle.fill;

              final t = math.sin(progress * math.pi * 2);
              final cx = size.width / 2;

              double headY = 34;
              double shoulderY = 76;
              double waistY = 138;
              double hipY = 156;
              double kneeY = 208;
              double footY = 244;

              double shoulderWidth = 36;
              double waistWidth = 22;
              double hipWidth = 28;

              double leftShoulderOffset = -shoulderWidth;
              double rightShoulderOffset = shoulderWidth;

              double leftElbowX = cx - 42;
              double rightElbowX = cx + 42;
              double leftElbowY = 112;
              double rightElbowY = 112;

              double leftHandX = cx - 50;
              double rightHandX = cx + 50;
              double leftHandY = 142;
              double rightHandY = 142;

              double leftKneeX = cx - 18;
              double rightKneeX = cx + 18;
              double leftFootX = cx - 28;
              double rightFootX = cx + 28;

              switch (pattern) {
                case MovementPattern.jumping:
                  leftElbowX = cx - 58 - (t * 10);
                  rightElbowX = cx + 58 + (t * 10);
                  leftElbowY = 86 - (t * 18);
                  rightElbowY = 86 - (t * 18);
                  leftHandX = cx - 72 - (t * 14);
                  rightHandX = cx + 72 + (t * 14);
                  leftHandY = 54 - (t * 18);
                  rightHandY = 54 - (t * 18);
                  leftFootX = cx - 42 - (t * 12);
                  rightFootX = cx + 42 + (t * 12);
                  break;

                case MovementPattern.squat:
                  final down = t > 0 ? t : 0.0;
                  headY += down * 10;
                  shoulderY += down * 16;
                  waistY += down * 24;
                  hipY += down * 28;
                  kneeY += down * 14;
                  leftFootX = cx - 38;
                  rightFootX = cx + 38;
                  leftKneeX = cx - 28;
                  rightKneeX = cx + 28;
                  break;

                case MovementPattern.push:
                  headY += t * 6;
                  shoulderY += t * 8;
                  waistY += t * 8;
                  hipY += t * 8;
                  leftElbowX = cx - 56;
                  rightElbowX = cx + 56;
                  leftElbowY = 144 + t * 6;
                  rightElbowY = 144 + t * 6;
                  leftHandX = cx - 72;
                  rightHandX = cx + 72;
                  leftHandY = 176 + t * 6;
                  rightHandY = 176 + t * 6;
                  leftFootX = cx - 34;
                  rightFootX = cx + 34;
                  footY = 230;
                  break;

                case MovementPattern.plank:
                  headY = 62;
                  shoulderY = 92;
                  waistY = 132;
                  hipY = 146;
                  kneeY = 162;
                  footY = 178;
                  leftElbowX = cx - 62;
                  rightElbowX = cx + 62;
                  leftElbowY = 104;
                  rightElbowY = 104;
                  leftHandX = cx - 82;
                  rightHandX = cx + 82;
                  leftHandY = 118;
                  rightHandY = 118;
                  leftKneeX = cx - 54;
                  rightKneeX = cx + 54;
                  leftFootX = cx - 88;
                  rightFootX = cx + 88;
                  break;

                case MovementPattern.lunge:
                  leftFootX = cx - 48 - t * 6;
                  rightFootX = cx + 26;
                  leftKneeX = cx - 34;
                  rightKneeX = cx + 18;
                  break;

                case MovementPattern.crunch:
                  headY += t * 14;
                  shoulderY += t * 14;
                  waistY -= t * 6;
                  hipY -= t * 8;
                  leftElbowX = cx - 26;
                  rightElbowX = cx + 26;
                  leftElbowY = 80 + t * 8;
                  rightElbowY = 80 + t * 8;
                  leftHandX = cx - 18;
                  rightHandX = cx + 18;
                  leftHandY = 60 + t * 10;
                  rightHandY = 60 + t * 10;
                  kneeY = 188 - t * 16;
                  footY = 214 - t * 12;
                  break;

                case MovementPattern.bridge:
                  final up = t > 0 ? t : 0.0;
                  waistY -= up * 8;
                  hipY -= up * 18;
                  kneeY -= up * 4;
                  leftFootX = cx - 34;
                  rightFootX = cx + 34;
                  break;

                case MovementPattern.stretch:
                  leftElbowX = cx - 56 - t * 10;
                  rightElbowX = cx + 56 + t * 10;
                  leftElbowY = 84 - t * 8;
                  rightElbowY = 84 + t * 8;
                  leftHandX = cx - 72 - t * 10;
                  rightHandX = cx + 72 + t * 10;
                  leftHandY = 62 - t * 6;
                  rightHandY = 126 + t * 6;
                  break;

                case MovementPattern.run:
                  leftElbowX = cx - 28 - t * 18;
                  rightElbowX = cx + 28 + t * 18;
                  leftElbowY = 92 - t * 10;
                  rightElbowY = 118 + t * 10;
                  leftHandX = cx - 42 - t * 18;
                  rightHandX = cx + 42 + t * 18;
                  leftHandY = 68 - t * 10;
                  rightHandY = 144 + t * 10;
                  leftKneeX = cx - 12 - t * 14;
                  rightKneeX = cx + 12 + t * 14;
                  leftFootX = cx - 26 - t * 16;
                  rightFootX = cx + 26 + t * 16;
                  footY = 236;
                  break;

                case MovementPattern.twist:
                  leftShoulderOffset = -shoulderWidth - t * 4;
                  rightShoulderOffset = shoulderWidth + t * 4;
                  leftElbowX = cx - 46 - t * 8;
                  rightElbowX = cx + 46 + t * 8;
                  leftHandX = cx - 60 - t * 10;
                  rightHandX = cx + 60 + t * 10;
                  break;

                case MovementPattern.kick:
                  rightKneeX = cx + 24 + t * 8;
                  rightFootX = cx + 44 + t * 20;
                  footY = 238 - (t > 0 ? t * 18 : 0);
                  break;

                case MovementPattern.raise:
                  leftElbowY = 90 - t * 10;
                  rightElbowY = 90 - t * 10;
                  leftHandY = 56 - t * 18;
                  rightHandY = 56 - t * 18;
                  break;

                case MovementPattern.generic:
                  leftElbowX = cx - 42 - (t * 4);
                  rightElbowX = cx + 42 + (t * 4);
                  leftHandX = cx - 50 - (t * 5);
                  rightHandX = cx + 50 + (t * 5);
                  leftFootX = cx - 28 - (t * 4);
                  rightFootX = cx + 28 + (t * 4);
                  break;
              }

              final headCenter = Offset(cx, headY);
              final neck = Offset(cx, headY + 22);

              final leftShoulder = Offset(cx + leftShoulderOffset, shoulderY);
              final rightShoulder = Offset(cx + rightShoulderOffset, shoulderY);

              final leftWaist = Offset(cx - waistWidth, waistY);
              final rightWaist = Offset(cx + waistWidth, waistY);

              final leftHip = Offset(cx - hipWidth, hipY);
              final rightHip = Offset(cx + hipWidth, hipY);

              final torsoPath = Path()
                ..moveTo(leftShoulder.dx, leftShoulder.dy)
                ..lineTo(rightShoulder.dx, rightShoulder.dy)
                ..lineTo(rightWaist.dx, rightWaist.dy)
                ..lineTo(rightHip.dx, rightHip.dy)
                ..lineTo(leftHip.dx, leftHip.dy)
                ..lineTo(leftWaist.dx, leftWaist.dy)
                ..close();

              canvas.drawPath(torsoPath, fill);
              canvas.drawCircle(headCenter, 18, glow);
              canvas.drawCircle(headCenter, 18, neon);

              canvas.drawLine(neck, Offset(cx, shoulderY + 4), glow);
              canvas.drawLine(neck, Offset(cx, shoulderY + 4), neon);

              final spineTop = Offset(cx, shoulderY + 10);
              final spineBottom = Offset(cx, hipY - 2);
              canvas.drawLine(spineTop, spineBottom, glow);
              canvas.drawLine(spineTop, spineBottom, neon);
              canvas.drawPath(torsoPath, glow);
              canvas.drawPath(torsoPath, neon);

              final leftElbow = Offset(leftElbowX, leftElbowY);
              final rightElbow = Offset(rightElbowX, rightElbowY);
              final leftHand = Offset(leftHandX, leftHandY);
              final rightHand = Offset(rightHandX, rightHandY);
              final leftKnee = Offset(leftKneeX, kneeY);
              final rightKnee = Offset(rightKneeX, kneeY);
              final leftFoot = Offset(leftFootX, footY);
              final rightFoot = Offset(rightFootX, footY);

              void limb(Offset a, Offset b, Offset c) {
                final path = Path()
                  ..moveTo(a.dx, a.dy)
                  ..lineTo(b.dx, b.dy)
                  ..lineTo(c.dx, c.dy);
                canvas.drawPath(path, glow);
                canvas.drawPath(path, neon);
              }

              limb(leftShoulder, leftElbow, leftHand);
              limb(rightShoulder, rightElbow, rightHand);
              limb(leftHip, leftKnee, leftFoot);
              limb(rightHip, rightKnee, rightFoot);
            }

            @override
            bool shouldRepaint(covariant HumanTrainerPainter oldDelegate) {
              return oldDelegate.progress != progress || oldDelegate.pattern != pattern;
            }
          }

          class _Template {
            final String baseName;
            final String description;
            final ExerciseCategory category;
            final List<String> muscles;
            final int calories;

            const _Template(this.baseName, this.description, this.category, this.muscles, this.calories);
          }

          class _Variation {
            final String suffix;
            final ExerciseDifficulty difficulty;
            final int durationSeconds;
            final double multiplier;

            const _Variation(this.suffix, this.difficulty, this.durationSeconds, this.multiplier);
          }
          EOF

      - name: Build APK
        script: |
          cd app
          flutter build apk --release

    artifacts:
      - app/build/app/outputs/flutter-apk/*.apk
