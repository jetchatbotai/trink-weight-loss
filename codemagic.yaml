workflows:
  android-build:
    name: Trink Android Build
    max_build_duration: 30
    environment:
      flutter: stable

    scripts:
      - name: Prepare Flutter project
        script: |
          flutter create . --platforms=android --project-name trink_weight_loss --org com.trink.weightloss
          flutter pub get

      - name: Build APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
