workflows:
  trink-android:
    name: Trink Android Build
    max_build_duration: 60
    environment:
      flutter: stable

    scripts:
      - name: Unzip project
        script: |
          unzip -o TrinkWeightLoss_Clean_Flutter_Project.zip -d extracted
          APP_DIR=$(find extracted -name pubspec.yaml | head -n 1 | xargs dirname)
          if [ -z "$APP_DIR" ]; then
            echo "pubspec.yaml not found"
            exit 1
          fi
          echo "Found app dir: $APP_DIR"
          echo "APP_DIR=$APP_DIR" >> $CM_ENV
- name: Prepare Flutter project
        script: |
          cd "$APP_DIR"
          if [ ! -d "android" ]; then
            flutter create . --platforms=android --project-name trink_weight_loss --org com.trink.weightloss
          fi
          flutter pub get
      
        
          
          
          

      - name: Build APK
        script: |
          cd "$APP_DIR"
          flutter build apk --release

      - name: Build AAB
        script: |
          cd "$APP_DIR"
          flutter build appbundle --release

    artifacts:
      - extracted/**/build/**/outputs/**/*.apk
      - extracted/**/build/**/outputs/**/*.aab
