workflows:
  android-build:
    name: Trink Android Build
    max_build_duration: 30
    environment:
      flutter: stable

    scripts:
      - name: Create Flutter project
        script: |
          flutter create trink_app --platforms=android --project-name trink_weight_loss --org com.trink

      - name: Replace main.dart with professional app
        script: |
          cd trink_app
          cat > lib/main.dart << 'EOF'
          import 'dart:async';
          import 'package:flutter/material.dart';

          void main() {
            runApp(const TrinkApp());
          }

          class TrinkApp extends StatelessWidget {
            const TrinkApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                title: 'Trink Weight Loss',
                theme: ThemeData(
                  brightness: Brightness.dark,
                  scaffoldBackgroundColor: const Color(0xFF0B0B0B),
                  useMaterial3: true,
                  colorScheme: const ColorScheme.dark(
                    primary: Color(0xFF39FF14),
                    secondary: Color(0xFF39FF14),
                    surface: Color(0xFF171717),
                  ),
                ),
                home: const MainShell(),
              );
            }
          }

          enum ExerciseCategory {
            abs('Abs'),
            legs('Legs'),
            glutes('Glutes'),
            arms('Arms'),
            shoulders('Shoulders'),
            chest('Chest'),
            back('Back'),
            fullBody('Full Body'),
            cardio('Cardio'),
            stretching('Stretching'),
            hiit('HIIT'),
            mobility('Mobility');

            const ExerciseCategory(this.label);
            final String label;
          }

          enum ExerciseDifficulty {
            beginner('Beginner'),
            intermediate('Intermediate'),
            advanced('Advanced');

            const ExerciseDifficulty(this.label);
            final String label;
          }

          class Exercise {
            final String id;
            final String name;
            final String description;
            final ExerciseCategory category;
            final ExerciseDifficulty difficulty;
            final int durationSeconds;
            final int calories;
            final List<String> targetMuscles;

            const Exercise({
              required this.id,
              required this.name,
              required this.description,
              required this.category,
              required this.difficulty,
              required this.durationSeconds,
              required this.calories,
              required this.targetMuscles,
            });

            String get formattedDuration {
              final minutes = durationSeconds ~/ 60;
              final seconds = durationSeconds % 60;
              if (minutes > 0 && seconds == 0) {
                return '$minutes min';
              }
              if (minutes > 0) {
                return '$minutes min $seconds sec';
              }
              return '$seconds sec';
            }
          }

          class WorkoutCollection {
            final String id;
            final String title;
            final String subtitle;
            final String goal;
            final ExerciseDifficulty difficulty;
            final List<Exercise> exercises;

            const WorkoutCollection({
              required this.id,
              required this.title,
              required this.subtitle,
              required this.goal,
              required this.difficulty,
              required this.exercises,
            });

            int get totalDuration =>
                exercises.fold(0, (sum, item) => sum + item.durationSeconds);

            int get totalCalories =>
                exercises.fold(0, (sum, item) => sum + item.calories);

            String get formattedDuration {
              final minutes = totalDuration ~/ 60;
              final seconds = totalDuration % 60;
              if (seconds == 0) return '$minutes min';
              return '$minutes min $seconds sec';
            }
          }

          class ExerciseRepository {
            static final List<Exercise> allExercises = _buildExercises();

            static List<Exercise> _buildExercises() {
              final templates = <_Template>[
                _Template(
                  baseName: 'Jumping Jacks',
                  description: 'Classic cardio movement for a quick warm-up and fat burn.',
                  category: ExerciseCategory.cardio,
                  muscles: ['Full Body', 'Legs', 'Shoulders'],
                  calories: 18,
                ),
                _Template(
                  baseName: 'Mountain Climbers',
                  description: 'Core and cardio movement for endurance and burn.',
                  category: ExerciseCategory.fullBody,
                  muscles: ['Core', 'Shoulders', 'Legs'],
                  calories: 22,
                ),
                _Template(
                  baseName: 'Plank Hold',
                  description: 'Static core stability exercise.',
                  category: ExerciseCategory.abs,
                  muscles: ['Core', 'Shoulders'],
                  calories: 12,
                ),
                _Template(
                  baseName: 'Bicycle Crunch',
                  description: 'Dynamic abdominal movement for abs and obliques.',
                  category: ExerciseCategory.abs,
                  muscles: ['Abs', 'Obliques'],
                  calories: 16,
                ),
                _Template(
                  baseName: 'Leg Raises',
                  description: 'Lower abdominal strengthening movement.',
                  category: ExerciseCategory.abs,
                  muscles: ['Lower Abs', 'Hip Flexors'],
                  calories: 13,
                ),
                _Template(
                  baseName: 'Bodyweight Squat',
                  description: 'Foundational lower body strength exercise.',
                  category: ExerciseCategory.legs,
                  muscles: ['Quads', 'Glutes', 'Hamstrings'],
                  calories: 16,
                ),
                _Template(
                  baseName: 'Jump Squat',
                  description: 'Explosive leg movement for power and calorie burn.',
                  category: ExerciseCategory.legs,
                  muscles: ['Glutes', 'Quads', 'Calves'],
                  calories: 24,
                ),
                _Template(
                  baseName: 'Forward Lunge',
                  description: 'Single-leg exercise for strength and balance.',
                  category: ExerciseCategory.legs,
                  muscles: ['Quads', 'Glutes', 'Hamstrings'],
                  calories: 15,
                ),
                _Template(
                  baseName: 'Glute Bridge',
                  description: 'Hip extension movement focused on the glutes.',
                  category: ExerciseCategory.glutes,
                  muscles: ['Glutes', 'Hamstrings'],
                  calories: 11,
                ),
                _Template(
                  baseName: 'Donkey Kick',
                  description: 'Glute activation and shaping movement.',
                  category: ExerciseCategory.glutes,
                  muscles: ['Glutes'],
                  calories: 10,
                ),
                _Template(
                  baseName: 'Push Up',
                  description: 'Classic upper-body bodyweight exercise.',
                  category: ExerciseCategory.chest,
                  muscles: ['Chest', 'Triceps', 'Shoulders'],
                  calories: 16,
                ),
                _Template(
                  baseName: 'Knee Push Up',
                  description: 'Beginner-friendly chest press movement.',
                  category: ExerciseCategory.chest,
                  muscles: ['Chest', 'Triceps'],
                  calories: 11,
                ),
                _Template(
                  baseName: 'Pike Push Up',
                  description: 'Bodyweight shoulder pressing movement.',
                  category: ExerciseCategory.shoulders,
                  muscles: ['Shoulders', 'Triceps'],
                  calories: 17,
                ),
                _Template(
                  baseName: 'Arm Circles',
                  description: 'Shoulder endurance and warm-up drill.',
                  category: ExerciseCategory.shoulders,
                  muscles: ['Shoulders'],
                  calories: 8,
                ),
                _Template(
                  baseName: 'Tricep Dip',
                  description: 'Bodyweight tricep builder using a chair or edge.',
                  category: ExerciseCategory.arms,
                  muscles: ['Triceps', 'Shoulders'],
                  calories: 13,
                ),
                _Template(
                  baseName: 'Superman Hold',
                  description: 'Posterior chain movement for the back and glutes.',
                  category: ExerciseCategory.back,
                  muscles: ['Lower Back', 'Glutes', 'Upper Back'],
                  calories: 9,
                ),
                _Template(
                  baseName: 'Bird Dog',
                  description: 'Core stability and posture exercise.',
                  category: ExerciseCategory.back,
                  muscles: ['Core', 'Lower Back', 'Glutes'],
                  calories: 9,
                ),
                _Template(
                  baseName: 'Burpee',
                  description: 'High-intensity full-body fat burning exercise.',
                  category: ExerciseCategory.hiit,
                  muscles: ['Full Body'],
                  calories: 28,
                ),
                _Template(
                  baseName: 'High Knees',
                  description: 'Fast cardio drill to elevate heart rate.',
                  category: ExerciseCategory.hiit,
                  muscles: ['Core', 'Legs'],
                  calories: 20,
                ),
                _Template(
                  baseName: 'Fast Feet',
                  description: 'Footwork cardio movement with high pace.',
                  category: ExerciseCategory.cardio,
                  muscles: ['Legs', 'Calves'],
                  calories: 18,
                ),
                _Template(
                  baseName: 'Skaters',
                  description: 'Lateral cardio exercise for agility and burn.',
                  category: ExerciseCategory.cardio,
                  muscles: ['Glutes', 'Legs', 'Core'],
                  calories: 19,
                ),
                _Template(
                  baseName: 'Cat Cow Stretch',
                  description: 'Mobility and spinal movement for recovery.',
                  category: ExerciseCategory.stretching,
                  muscles: ['Spine', 'Core'],
                  calories: 5,
                ),
                _Template(
                  baseName: 'Hamstring Stretch',
                  description: 'Recovery stretch for the back of the legs.',
                  category: ExerciseCategory.stretching,
                  muscles: ['Hamstrings'],
                  calories: 4,
                ),
                _Template(
                  baseName: 'Hip Opener',
                  description: 'Mobility drill for the hips and lower body.',
                  category: ExerciseCategory.mobility,
                  muscles: ['Hips', 'Glutes'],
                  calories: 6,
                ),
                _Template(
                  baseName: 'Torso Twist',
                  description: 'Mobility movement for trunk rotation and posture.',
                  category: ExerciseCategory.mobility,
                  muscles: ['Core', 'Spine'],
                  calories: 6,
                ),
              ];

              final variations = <_Variation>[
                _Variation(
                  suffix: 'Beginner',
                  difficulty: ExerciseDifficulty.beginner,
                  durationSeconds: 30,
                  multiplier: 1.0,
                ),
                _Variation(
                  suffix: 'Intermediate',
                  difficulty: ExerciseDifficulty.intermediate,
                  durationSeconds: 45,
                  multiplier: 1.2,
                ),
                _Variation(
                  suffix: 'Advanced',
                  difficulty: ExerciseDifficulty.advanced,
                  durationSeconds: 60,
                  multiplier: 1.5,
                ),
                _Variation(
                  suffix: 'Quick Burn',
                  difficulty: ExerciseDifficulty.intermediate,
                  durationSeconds: 40,
                  multiplier: 1.15,
                ),
                _Variation(
                  suffix: 'Endurance',
                  difficulty: ExerciseDifficulty.advanced,
                  durationSeconds: 90,
                  multiplier: 1.9,
                ),
                _Variation(
                  suffix: 'Power',
                  difficulty: ExerciseDifficulty.advanced,
                  durationSeconds: 50,
                  multiplier: 1.35,
                ),
                _Variation(
                  suffix: 'Lite',
                  difficulty: ExerciseDifficulty.beginner,
                  durationSeconds: 25,
                  multiplier: 0.85,
                ),
                _Variation(
                  suffix: 'Tempo',
                  difficulty: ExerciseDifficulty.intermediate,
                  durationSeconds: 55,
                  multiplier: 1.25,
                ),
              ];

              final exercises = <Exercise>[];
              int index = 1;

              for (final template in templates) {
                for (final variation in variations) {
                  exercises.add(
                    Exercise(
                      id: 'ex_${index.toString().padLeft(3, '0')}',
                      name: '${template.baseName} ${variation.suffix}',
                      description: template.description,
                      category: template.category,
                      difficulty: variation.difficulty,
                      durationSeconds: variation.durationSeconds,
                      calories: (template.calories * variation.multiplier).round(),
                      targetMuscles: template.muscles,
                    ),
                  );
                  index++;
                }
              }

              return exercises;
            }
          }

          class WorkoutRepository {
            static List<WorkoutCollection> buildCollections(List<Exercise> all) {
              List<Exercise> pick(ExerciseCategory category, int count) {
                return all.where((e) => e.category == category).take(count).toList();
              }

              List<Exercise> mix(List<ExerciseCategory> categories, int countPerCategory) {
                final result = <Exercise>[];
                for (final category in categories) {
                  result.addAll(
                    all.where((e) => e.category == category).take(countPerCategory),
                  );
                }
                return result;
              }

              return [
                WorkoutCollection(
                  id: 'w1',
                  title: 'Quick Fat Burn',
                  subtitle: 'Fast home cardio routine',
                  goal: 'Burn calories quickly',
                  difficulty: ExerciseDifficulty.beginner,
                  exercises: mix(
                    [ExerciseCategory.cardio, ExerciseCategory.hiit, ExerciseCategory.fullBody],
                    3,
                  ),
                ),
                WorkoutCollection(
                  id: 'w2',
                  title: 'Abs Builder',
                  subtitle: 'Core-focused sculpt routine',
                  goal: 'Strengthen abs and core',
                  difficulty: ExerciseDifficulty.intermediate,
                  exercises: pick(ExerciseCategory.abs, 10),
                ),
                WorkoutCollection(
                  id: 'w3',
                  title: 'Legs and Glutes',
                  subtitle: 'Lower body shaping plan',
                  goal: 'Tone legs and glutes',
                  difficulty: ExerciseDifficulty.intermediate,
                  exercises: [
                    ...pick(ExerciseCategory.legs, 6),
                    ...pick(ExerciseCategory.glutes, 6),
                  ],
                ),
                WorkoutCollection(
                  id: 'w4',
                  title: 'Upper Body Strength',
                  subtitle: 'Chest, arms, shoulders and back',
                  goal: 'Build upper body strength',
                  difficulty: ExerciseDifficulty.advanced,
                  exercises: [
                    ...pick(ExerciseCategory.chest, 4),
                    ...pick(ExerciseCategory.arms, 4),
                    ...pick(ExerciseCategory.shoulders, 4),
                    ...pick(ExerciseCategory.back, 4),
                  ],
                ),
                WorkoutCollection(
                  id: 'w5',
                  title: 'Mobility and Recovery',
                  subtitle: 'Stretch and recover routine',
                  goal: 'Relax and improve flexibility',
                  difficulty: ExerciseDifficulty.beginner,
                  exercises: [
                    ...pick(ExerciseCategory.mobility, 4),
                    ...pick(ExerciseCategory.stretching, 6),
                  ],
                ),
                WorkoutCollection(
                  id: 'w6',
                  title: 'HIIT Challenge',
                  subtitle: 'High intensity calorie crusher',
                  goal: 'Intense fat burn session',
                  difficulty: ExerciseDifficulty.advanced,
                  exercises: [
                    ...pick(ExerciseCategory.hiit, 8),
                    ...pick(ExerciseCategory.cardio, 4),
                  ],
                ),
              ];
            }
          }

          class MainShell extends StatefulWidget {
            const MainShell({super.key});

            @override
            State<MainShell> createState() => _MainShellState();
          }

          class _MainShellState extends State<MainShell> {
            int currentIndex = 0;
            final allExercises = ExerciseRepository.allExercises;
            late final List<WorkoutCollection> collections =
                WorkoutRepository.buildCollections(allExercises);

            @override
            Widget build(BuildContext context) {
              final pages = [
                HomePage(
                  exerciseCount: allExercises.length,
                  collections: collections,
                ),
                WorkoutCollectionsPage(collections: collections),
                ExerciseCatalogPage(exercises: allExercises),
                const ProfilePage(),
              ];

              return Scaffold(
                body: SafeArea(child: pages[currentIndex]),
                bottomNavigationBar: NavigationBar(
                  selectedIndex: currentIndex,
                  backgroundColor: const Color(0xFF111111),
                  indicatorColor: const Color(0x2239FF14),
                  onDestinationSelected: (value) {
                    setState(() {
                      currentIndex = value;
                    });
                  },
                  destinations: const [
                    NavigationDestination(
                      icon: Icon(Icons.home_outlined),
                      selectedIcon: Icon(Icons.home),
                      label: 'Home',
                    ),
                    NavigationDestination(
                      icon: Icon(Icons.fitness_center_outlined),
                      selectedIcon: Icon(Icons.fitness_center),
                      label: 'Workouts',
                    ),
                    NavigationDestination(
                      icon: Icon(Icons.grid_view_outlined),
                      selectedIcon: Icon(Icons.grid_view),
                      label: 'Exercises',
                    ),
                    NavigationDestination(
                      icon: Icon(Icons.person_outline),
                      selectedIcon: Icon(Icons.person),
                      label: 'Profile',
                    ),
                  ],
                ),
              );
            }
          }

          class HomePage extends StatelessWidget {
            final int exerciseCount;
            final List<WorkoutCollection> collections;

            const HomePage({
              super.key,
              required this.exerciseCount,
              required this.collections,
            });

            @override
            Widget build(BuildContext context) {
              final totalPrograms = collections.length;
              return ListView(
                padding: const EdgeInsets.all(16),
                children: [
                  const Text(
                    'Trink Weight Loss',
                    style: TextStyle(fontSize: 30, fontWeight: FontWeight.bold),
                  ),
                  const SizedBox(height: 6),
                  const Text(
                    'Professional fitness, 200+ exercises and smart workout collections',
                    style: TextStyle(color: Colors.white70),
                  ),
                  const SizedBox(height: 18),
                  _heroCard(
                    icon: Icons.local_fire_department,
                    title: 'Workout Engine Ready',
                    subtitle: 'Your professional workout system is now active',
                    trailing: '$exerciseCount+',
                  ),
                  const SizedBox(height: 16),
                  Row(
                    children: [
                      Expanded(
                        child: _statCard(
                          icon: Icons.grid_view,
                          title: 'Exercises',
                          value: '$exerciseCount',
                        ),
                      ),
                      const SizedBox(width: 12),
                      Expanded(
                        child: _statCard(
                          icon: Icons.view_list,
                          title: 'Programs',
                          value: '$totalPrograms',
                        ),
                      ),
                    ],
                  ),
                  const SizedBox(height: 20),
                  const Text(
                    'Featured Programs',
                    style: TextStyle(fontSize: 22, fontWeight: FontWeight.bold),
                  ),
                  const SizedBox(height: 10),
                  ...collections.take(3).map(
                    (collection) => _programTile(context, collection),
                  ),
                ],
              );
            }

            Widget _heroCard({
              required IconData icon,
              required String title,
              required String subtitle,
              required String trailing,
            }) {
              return Container(
                padding: const EdgeInsets.all(18),
                decoration: BoxDecoration(
                  color: const Color(0xFF171717),
                  borderRadius: BorderRadius.circular(24),
                  border: Border.all(color: const Color(0x2239FF14)),
                ),
                child: Row(
                  children: [
                    Container(
                      width: 58,
                      height: 58,
                      decoration: const BoxDecoration(
                        color: Color(0x2239FF14),
                        shape: BoxShape.circle,
                      ),
                      child: Icon(icon, color: const Color(0xFF39FF14)),
                    ),
                    const SizedBox(width: 14),
                    Expanded(
                      child: Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Text(title, style: const TextStyle(fontSize: 20, fontWeight: FontWeight.bold)),
                          const SizedBox(height: 4),
                          Text(subtitle, style: const TextStyle(color: Colors.white70)),
                        ],
                      ),
                    ),
                    Text(
                      trailing,
                      style: const TextStyle(
                        color: Color(0xFF39FF14),
                        fontWeight: FontWeight.bold,
                        fontSize: 24,
                      ),
                    ),
                  ],
                ),
              );
            }

            Widget _statCard({
              required IconData icon,
              required String title,
              required String value,
            }) {
              return Container(
                padding: const EdgeInsets.all(16),
                decoration: BoxDecoration(
                  color: const Color(0xFF171717),
                  borderRadius: BorderRadius.circular(20),
                  border: Border.all(color: const Color(0x2239FF14)),
                ),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    Icon(icon, color: const Color(0xFF39FF14)),
                    const SizedBox(height: 12),
                    Text(title, style: const TextStyle(color: Colors.white70)),
                    const SizedBox(height: 4),
                    Text(value, style: const TextStyle(fontSize: 22, fontWeight: FontWeight.bold)),
                  ],
                ),
              );
            }

            Widget _programTile(BuildContext context, WorkoutCollection collection) {
              return InkWell(
                onTap: () {
                  Navigator.push(
                    context,
                    MaterialPageRoute(
                      builder: (_) => WorkoutDetailPage(collection: collection),
                    ),
                  );
                },
                child: Container(
                  margin: const EdgeInsets.only(bottom: 12),
                  padding: const EdgeInsets.all(16),
                  decoration: BoxDecoration(
                    color: const Color(0xFF171717),
                    borderRadius: BorderRadius.circular(20),
                    border: Border.all(color: const Color(0x2239FF14)),
                  ),
                  child: Row(
                    children: [
                      const CircleAvatar(
                        backgroundColor: Color(0x2239FF14),
                        child: Icon(Icons.play_arrow, color: Color(0xFF39FF14)),
                      ),
                      const SizedBox(width: 12),
                      Expanded(
                        child: Column(
                          crossAxisAlignment: CrossAxisAlignment.start,
                          children: [
                            Text(collection.title, style: const TextStyle(fontSize: 17, fontWeight: FontWeight.bold)),
                            const SizedBox(height: 4),
                            Text(collection.subtitle, style: const TextStyle(color: Colors.white70)),
                          ],
                        ),
                      ),
                      const Icon(Icons.chevron_right, color: Colors.white54),
                    ],
                  ),
                ),
              );
            }
          }

          class WorkoutCollectionsPage extends StatelessWidget {
            final List<WorkoutCollection> collections;

            const WorkoutCollectionsPage({
              super.key,
              required this.collections,
            });

            @override
            Widget build(BuildContext context) {
              return ListView(
                padding: const EdgeInsets.all(16),
                children: [
                  const Text(
                    'Workout Collections',
                    style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold),
                  ),
                  const SizedBox(height: 6),
                  const Text(
                    'Different workout bundles for different goals',
                    style: TextStyle(color: Colors.white70),
                  ),
                  const SizedBox(height: 16),
                  ...collections.map(
                    (collection) => InkWell(
                      onTap: () {
                        Navigator.push(
                          context,
                          MaterialPageRoute(
                            builder: (_) => WorkoutDetailPage(collection: collection),
                          ),
                        );
                      },
                      child: Container(
                        margin: const EdgeInsets.only(bottom: 12),
                        padding: const EdgeInsets.all(16),
                        decoration: BoxDecoration(
                          color: const Color(0xFF171717),
                          borderRadius: BorderRadius.circular(20),
                          border: Border.all(color: const Color(0x2239FF14)),
                        ),
                        child: Column(
                          crossAxisAlignment: CrossAxisAlignment.start,
                          children: [
                            Text(
                              collection.title,
                              style: const TextStyle(fontSize: 18, fontWeight: FontWeight.bold),
                            ),
                            const SizedBox(height: 4),
                            Text(collection.subtitle, style: const TextStyle(color: Colors.white70)),
                            const SizedBox(height: 10),
                            Wrap(
                              spacing: 8,
                              runSpacing: 8,
                              children: [
                                _chip(collection.goal),
                                _chip(collection.difficulty.label),
                                _chip(collection.formattedDuration),
                                _chip('${collection.totalCalories} kcal'),
                              ],
                            ),
                          ],
                        ),
                      ),
                    ),
                  ),
                ],
              );
            }

            Widget _chip(String label) {
              return Container(
                padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 8),
                decoration: BoxDecoration(
                  color: const Color(0x2239FF14),
                  borderRadius: BorderRadius.circular(16),
                ),
                child: Text(label, style: const TextStyle(color: Colors.white)),
              );
            }
          }

          class WorkoutDetailPage extends StatelessWidget {
            final WorkoutCollection collection;

            const WorkoutDetailPage({
              super.key,
              required this.collection,
            });

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text(collection.title),
                ),
                body: ListView(
                  padding: const EdgeInsets.all(16),
                  children: [
                    Container(
                      padding: const EdgeInsets.all(18),
                      decoration: BoxDecoration(
                        color: const Color(0xFF171717),
                        borderRadius: BorderRadius.circular(24),
                        border: Border.all(color: const Color(0x2239FF14)),
                      ),
                      child: Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Text(
                            collection.subtitle,
                            style: const TextStyle(fontSize: 18, fontWeight: FontWeight.bold),
                          ),
                          const SizedBox(height: 6),
                          Text(collection.goal, style: const TextStyle(color: Colors.white70)),
                          const SizedBox(height: 12),
                          Text('Exercises: ${collection.exercises.length}'),
                          Text('Duration: ${collection.formattedDuration}'),
                          Text('Estimated calories: ${collection.totalCalories} kcal'),
                          const SizedBox(height: 16),
                          SizedBox(
                            width: double.infinity,
                            child: FilledButton(
                              style: FilledButton.styleFrom(
                                backgroundColor: const Color(0xFF39FF14),
                                foregroundColor: Colors.black,
                              ),
                              onPressed: () {
                                Navigator.push(
                                  context,
                                  MaterialPageRoute(
                                    builder: (_) => WorkoutRunnerPage(collection: collection),
                                  ),
                                );
                              },
                              child: const Text('Start Workout'),
                            ),
                          ),
                        ],
                      ),
                    ),
                    const SizedBox(height: 18),
                    const Text(
                      'Exercise List',
                      style: TextStyle(fontSize: 22, fontWeight: FontWeight.bold),
                    ),
                    const SizedBox(height: 10),
                    ...collection.exercises.map(
                      (exercise) => Container(
                        margin: const EdgeInsets.only(bottom: 12),
                        padding: const EdgeInsets.all(16),
                        decoration: BoxDecoration(
                          color: const Color(0xFF171717),
                          borderRadius: BorderRadius.circular(20),
                          border: Border.all(color: const Color(0x2239FF14)),
                        ),
                        child: Column(
                          crossAxisAlignment: CrossAxisAlignment.start,
                          children: [
                            Text(
                              exercise.name,
                              style: const TextStyle(fontSize: 16, fontWeight: FontWeight.bold),
                            ),
                            const SizedBox(height: 4),
                            Text(
                              exercise.description,
                              style: const TextStyle(color: Colors.white70),
                            ),
                            const SizedBox(height: 8),
                            Text(
                              '${exercise.category.label} • ${exercise.difficulty.label} • ${exercise.formattedDuration} • ${exercise.calories} kcal',
                              style: const TextStyle(color: Color(0xFF39FF14)),
                            ),
                          ],
                        ),
                      ),
                    ),
                  ],
                ),
              );
            }
          }

          class WorkoutRunnerPage extends StatefulWidget {
            final WorkoutCollection collection;

            const WorkoutRunnerPage({
              super.key,
              required this.collection,
            });

            @override
            State<WorkoutRunnerPage> createState() => _WorkoutRunnerPageState();
          }

          class _WorkoutRunnerPageState extends State<WorkoutRunnerPage> {
            Timer? timer;
            int currentIndex = 0;
            late int remainingSeconds;
            bool started = false;
            bool completed = false;

            Exercise get currentExercise => widget.collection.exercises[currentIndex];

            @override
            void initState() {
              super.initState();
              remainingSeconds = widget.collection.exercises.first.durationSeconds;
            }

            @override
            void dispose() {
              timer?.cancel();
              super.dispose();
            }

            void startTimer() {
              if (started) return;
              started = true;
              timer = Timer.periodic(const Duration(seconds: 1), (timer) {
                if (!mounted) return;
                setState(() {
                  if (remainingSeconds > 0) {
                    remainingSeconds--;
                  } else {
                    nextExercise();
                  }
                });
              });
            }

            void pauseTimer() {
              timer?.cancel();
              timer = null;
              started = false;
              setState(() {});
            }

            void nextExercise() {
              if (currentIndex < widget.collection.exercises.length - 1) {
                currentIndex++;
                remainingSeconds = widget.collection.exercises[currentIndex].durationSeconds;
              } else {
                timer?.cancel();
                started = false;
                completed = true;
              }
            }

            void previousExercise() {
              if (currentIndex > 0) {
                currentIndex--;
                remainingSeconds = widget.collection.exercises[currentIndex].durationSeconds;
                completed = false;
              }
            }

            String formatSeconds(int seconds) {
              final minutes = seconds ~/ 60;
              final remain = seconds % 60;
              final mm = minutes.toString().padLeft(2, '0');
              final ss = remain.toString().padLeft(2, '0');
              return '$mm:$ss';
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text(widget.collection.title),
                ),
                body: Padding(
                  padding: const EdgeInsets.all(16),
                  child: completed
                      ? _buildCompleted()
                      : Column(
                          crossAxisAlignment: CrossAxisAlignment.stretch,
                          children: [
                            Container(
                              padding: const EdgeInsets.all(18),
                              decoration: BoxDecoration(
                                color: const Color(0xFF171717),
                                borderRadius: BorderRadius.circular(24),
                                border: Border.all(color: const Color(0x2239FF14)),
                              ),
                              child: Column(
                                children: [
                                  Text(
                                    'Exercise ${currentIndex + 1} / ${widget.collection.exercises.length}',
                                    style: const TextStyle(color: Colors.white70),
                                  ),
                                  const SizedBox(height: 12),
                                  Text(
                                    currentExercise.name,
                                    textAlign: TextAlign.center,
                                    style: const TextStyle(fontSize: 24, fontWeight: FontWeight.bold),
                                  ),
                                  const SizedBox(height: 8),
                                  Text(
                                    currentExercise.description,
                                    textAlign: TextAlign.center,
                                    style: const TextStyle(color: Colors.white70),
                                  ),
                                  const SizedBox(height: 20),
                                  Text(
                                    formatSeconds(remainingSeconds),
                                    style: const TextStyle(
                                      fontSize: 48,
                                      fontWeight: FontWeight.w900,
                                      color: Color(0xFF39FF14),
                                    ),
                                  ),
                                  const SizedBox(height: 16),
                                  Wrap(
                                    spacing: 10,
                                    runSpacing: 10,
                                    alignment: WrapAlignment.center,
                                    children: [
                                      FilledButton(
                                        style: FilledButton.styleFrom(
                                          backgroundColor: const Color(0xFF39FF14),
                                          foregroundColor: Colors.black,
                                        ),
                                        onPressed: startTimer,
                                        child: const Text('Start'),
                                      ),
                                      OutlinedButton(
                                        onPressed: pauseTimer,
                                        child: const Text('Pause'),
                                      ),
                                      OutlinedButton(
                                        onPressed: previousExercise,
                                        child: const Text('Previous'),
                                      ),
                                      OutlinedButton(
                                        onPressed: () {
                                          setState(() {
                                            nextExercise();
                                          });
                                        },
                                        child: const Text('Next'),
                                      ),
                                    ],
                                  ),
                                ],
                              ),
                            ),
                            const SizedBox(height: 18),
                            const Text(
                              'Target Muscles',
                              style: TextStyle(fontSize: 20, fontWeight: FontWeight.bold),
                            ),
                            const SizedBox(height: 10),
                            Wrap(
                              spacing: 8,
                              runSpacing: 8,
                              children: currentExercise.targetMuscles
                                  .map(
                                    (muscle) => Container(
                                      padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 8),
                                      decoration: BoxDecoration(
                                        color: const Color(0x2239FF14),
                                        borderRadius: BorderRadius.circular(16),
                                      ),
                                      child: Text(muscle),
                                    ),
                                  )
                                  .toList(),
                            ),
                            const SizedBox(height: 18),
                            Container(
                              padding: const EdgeInsets.all(16),
                              decoration: BoxDecoration(
                                color: const Color(0xFF171717),
                                borderRadius: BorderRadius.circular(20),
                                border: Border.all(color: const Color(0x2239FF14)),
                              ),
                              child: Text(
                                'Estimated calories for this move: ${currentExercise.calories} kcal',
                                style: const TextStyle(fontSize: 16),
                              ),
                            ),
                          ],
                        ),
                ),
              );
            }

            Widget _buildCompleted() {
              return Container(
                padding: const EdgeInsets.all(24),
                decoration: BoxDecoration(
                  color: const Color(0xFF171717),
                  borderRadius: BorderRadius.circular(24),
                  border: Border.all(color: const Color(0x2239FF14)),
                ),
                child: Column(
                  mainAxisAlignment: MainAxisAlignment.center,
                  children: [
                    const Icon(
                      Icons.check_circle,
                      color: Color(0xFF39FF14),
                      size: 72,
                    ),
                    const SizedBox(height: 16),
                    const Text(
                      'Workout Completed',
                      style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold),
                    ),
                    const SizedBox(height: 8),
                    Text(
                      'You finished ${widget.collection.title}',
                      textAlign: TextAlign.center,
                      style: const TextStyle(color: Colors.white70),
                    ),
                    const SizedBox(height: 18),
                    Text(
                      'Total estimated calories: ${widget.collection.totalCalories} kcal',
                      style: const TextStyle(fontSize: 18),
                    ),
                  ],
                ),
              );
            }
          }

