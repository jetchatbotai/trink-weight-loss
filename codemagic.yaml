          class HumanTrainerPainter extends CustomPainter {
            final double progress;
            final MovementPattern pattern;

            HumanTrainerPainter({
              required this.progress,
              required this.pattern,
            });

            @override
            void paint(Canvas canvas, Size size) {
              final neon = Paint()
                ..color = const Color(0xFF39FF14)
                ..strokeWidth = 5.5
                ..style = PaintingStyle.stroke
                ..strokeCap = StrokeCap.round
                ..strokeJoin = StrokeJoin.round;

              final glow = Paint()
                ..color = const Color(0x5539FF14)
                ..strokeWidth = 14
                ..style = PaintingStyle.stroke
                ..strokeCap = StrokeCap.round
                ..strokeJoin = StrokeJoin.round
                ..maskFilter = const MaskFilter.blur(BlurStyle.normal, 10);

              final fill = Paint()
                ..color = const Color(0x1139FF14)
                ..style = PaintingStyle.fill;

              final t = math.sin(progress * math.pi * 2);
              final cx = size.width / 2;

              double headY = 34;
              double shoulderY = 74;
              double chestY = 96;
              double waistY = 136;
              double hipY = 156;
              double kneeY = 205;
              double footY = 244;

              double shoulderWidth = 38;
              double waistWidth = 24;
              double hipWidth = 28;

              double leftElbowX = cx - 42;
              double rightElbowX = cx + 42;
              double leftElbowY = 112;
              double rightElbowY = 112;

              double leftHandX = cx - 50;
              double rightHandX = cx + 50;
              double leftHandY = 142;
              double rightHandY = 142;

              double leftKneeX = cx - 18;
              double rightKneeX = cx + 18;
              double leftFootX = cx - 28;
              double rightFootX = cx + 28;

              switch (pattern) {
                case MovementPattern.jumping:
                  shoulderY = 72;
                  leftElbowX = cx - 58 - (t * 10);
                  rightElbowX = cx + 58 + (t * 10);
                  leftElbowY = 86 - (t * 18);
                  rightElbowY = 86 - (t * 18);
                  leftHandX = cx - 72 - (t * 14);
                  rightHandX = cx + 72 + (t * 14);
                  leftHandY = 54 - (t * 18);
                  rightHandY = 54 - (t * 18);
                  leftFootX = cx - 42 - (t * 12);
                  rightFootX = cx + 42 + (t * 12);
                  break;

                case MovementPattern.squat:
                  final down = t > 0 ? t : 0.0;
                  headY += down * 12;
                  shoulderY += down * 18;
                  chestY += down * 20;
                  waistY += down * 26;
                  hipY += down * 30;
                  kneeY += down * 18;
                  leftFootX = cx - 38;
                  rightFootX = cx + 38;
                  leftKneeX = cx - 28;
                  rightKneeX = cx + 28;
                  leftElbowY = 118 + down * 10;
                  rightElbowY = 118 + down * 10;
                  leftHandY = 148 + down * 8;
                  rightHandY = 148 + down * 8;
                  break;

                case MovementPattern.push:
                  headY += t * 7;
                  shoulderY += t * 9;
                  chestY += t * 10;
                  waistY += t * 8;
                  hipY += t * 7;
                  leftElbowX = cx - 56;
                  rightElbowX = cx + 56;
                  leftElbowY = 142 + t * 6;
                  rightElbowY = 142 + t * 6;
                  leftHandX = cx - 72;
                  rightHandX = cx + 72;
                  leftHandY = 174 + t * 6;
                  rightHandY = 174 + t * 6;
                  leftFootX = cx - 34;
                  rightFootX = cx + 34;
                  footY = 228;
                  break;

                case MovementPattern.plank:
                  headY = 62;
                  shoulderY = 92;
                  chestY = 106;
                  waistY = 126;
                  hipY = 142;
                  kneeY = 160;
                  footY = 176;
                  leftElbowX = cx - 62;
                  rightElbowX = cx + 62;
                  leftElbowY = 104;
                  rightElbowY = 104;
                  leftHandX = cx - 82;
                  rightHandX = cx + 82;
                  leftHandY = 118;
                  rightHandY = 118;
                  leftKneeX = cx - 54;
                  rightKneeX = cx + 54;
                  leftFootX = cx - 88;
                  rightFootX = cx + 88;
                  break;

                case MovementPattern.lunge:
                  leftFootX = cx - 48 - t * 6;
                  rightFootX = cx + 26;
                  leftKneeX = cx - 34;
                  rightKneeX = cx + 18;
                  rightElbowX = cx + 34;
                  leftElbowX = cx - 34;
                  break;

                case MovementPattern.crunch:
                  headY += t * 14;
                  shoulderY += t * 16;
                  chestY += t * 18;
                  waistY -= t * 6;
                  hipY -= t * 8;
                  leftElbowX = cx - 26;
                  rightElbowX = cx + 26;
                  leftElbowY = 78 + t * 8;
                  rightElbowY = 78 + t * 8;
                  leftHandX = cx - 18;
                  rightHandX = cx + 18;
                  leftHandY = 60 + t * 10;
                  rightHandY = 60 + t * 10;
                  kneeY = 188 - t * 16;
                  footY = 214 - t * 12;
                  break;

                case MovementPattern.bridge:
                  final up = t > 0 ? t : 0.0;
                  shoulderY += up * 4;
                  chestY += up * 4;
                  waistY -= up * 8;
                  hipY -= up * 18;
                  kneeY -= up * 4;
                  leftFootX = cx - 34;
                  rightFootX = cx + 34;
                  break;

                case MovementPattern.stretch:
                  leftElbowX = cx - 56 - t * 10;
                  rightElbowX = cx + 56 + t * 10;
                  leftElbowY = 84 - t * 8;
                  rightElbowY = 84 + t * 8;
                  leftHandX = cx - 72 - t * 10;
                  rightHandX = cx + 72 + t * 10;
                  leftHandY = 62 - t * 6;
                  rightHandY = 126 + t * 6;
                  break;

                case MovementPattern.run:
                  leftElbowX = cx - 28 - t * 18;
                  rightElbowX = cx + 28 + t * 18;
                  leftElbowY = 92 - t * 10;
                  rightElbowY = 118 + t * 10;
                  leftHandX = cx - 42 - t * 18;
                  rightHandX = cx + 42 + t * 18;
                  leftHandY = 68 - t * 10;
                  rightHandY = 144 + t * 10;
                  leftKneeX = cx - 12 - t * 14;
                  rightKneeX = cx + 12 + t * 14;
                  leftFootX = cx - 26 - t * 16;
                  rightFootX = cx + 26 + t * 16;
                  footY = 236;
                  break;

                case MovementPattern.twist:
                  leftElbowX = cx - 46 - t * 8;
                  rightElbowX = cx + 46 + t * 8;
                  leftHandX = cx - 60 - t * 10;
                  rightHandX = cx + 60 + t * 10;
                  leftShoulderXOffset = -shoulderWidth - t * 4;
                  rightShoulderXOffset = shoulderWidth + t * 4;
                  break;

                case MovementPattern.kick:
                  rightKneeX = cx + 24 + t * 8;
                  rightFootX = cx + 44 + t * 20;
                  footY = 238 - (t > 0 ? t * 18 : 0);
                  break;

                case MovementPattern.raise:
                  leftElbowY = 90 - t * 10;
                  rightElbowY = 90 - t * 10;
                  leftHandY = 56 - t * 18;
                  rightHandY = 56 - t * 18;
                  break;

                case MovementPattern.generic:
                  leftElbowX = cx - 42 - (t * 4);
                  rightElbowX = cx + 42 + (t * 4);
                  leftHandX = cx - 50 - (t * 5);
                  rightHandX = cx + 50 + (t * 5);
                  leftFootX = cx - 28 - (t * 4);
                  rightFootX = cx + 28 + (t * 4);
                  break;
              }

              double leftShoulderXOffset = -shoulderWidth;
              double rightShoulderXOffset = shoulderWidth;

              final headCenter = Offset(cx, headY);
              final neck = Offset(cx, headY + 22);

              final leftShoulder = Offset(cx + leftShoulderXOffset, shoulderY);
              final rightShoulder = Offset(cx + rightShoulderXOffset, shoulderY);

              final leftWaist = Offset(cx - waistWidth, waistY);
              final rightWaist = Offset(cx + waistWidth, waistY);

              final leftHip = Offset(cx - hipWidth, hipY);
              final rightHip = Offset(cx + hipWidth, hipY);

              final torsoPath = Path()
                ..moveTo(leftShoulder.dx, leftShoulder.dy)
                ..lineTo(rightShoulder.dx, rightShoulder.dy)
                ..lineTo(rightWaist.dx, rightWaist.dy)
                ..lineTo(rightHip.dx, rightHip.dy)
                ..lineTo(leftHip.dx, leftHip.dy)
                ..lineTo(leftWaist.dx, leftWaist.dy)
                ..close();

              canvas.drawPath(torsoPath, fill);

              canvas.drawCircle(headCenter, 18, glow);
              canvas.drawCircle(headCenter, 18, neon);
              canvas.drawLine(neck, Offset(cx, shoulderY + 4), glow);
              canvas.drawLine(neck, Offset(cx, shoulderY + 4), neon);

              final spineTop = Offset(cx, chestY);
              final spineBottom = Offset(cx, hipY - 2);
              canvas.drawLine(spineTop, spineBottom, glow);
              canvas.drawLine(spineTop, spineBottom, neon);

              canvas.drawPath(torsoPath, glow);
              canvas.drawPath(torsoPath, neon);

              final leftElbow = Offset(leftElbowX, leftElbowY);
              final rightElbow = Offset(rightElbowX, rightElbowY);
              final leftHand = Offset(leftHandX, leftHandY);
              final rightHand = Offset(rightHandX, rightHandY);

              final leftKnee = Offset(leftKneeX, kneeY);
              final rightKnee = Offset(rightKneeX, kneeY);
              final leftFoot = Offset(leftFootX, footY);
              final rightFoot = Offset(rightFootX, footY);

              void limb(Offset a, Offset b, Offset c) {
                final path = Path()
                  ..moveTo(a.dx, a.dy)
                  ..lineTo(b.dx, b.dy)
                  ..lineTo(c.dx, c.dy);
                canvas.drawPath(path, glow);
                canvas.drawPath(path, neon);
                canvas.drawCircle(b, 4, glow);
                canvas.drawCircle(b, 3, neon);
              }

              limb(leftShoulder, leftElbow, leftHand);
              limb(rightShoulder, rightElbow, rightHand);
              limb(leftHip, leftKnee, leftFoot);
              limb(rightHip, rightKnee, rightFoot);
            }

            @override
            bool shouldRepaint(covariant HumanTrainerPainter oldDelegate) {
              return oldDelegate.progress != progress || oldDelegate.pattern != pattern;
            }
          }

          class ProfilePage extends StatelessWidget {
            const ProfilePage({super.key});

            @override
            Widget build(BuildContext context) {
              return ListView(
                padding: const EdgeInsets.all(16),
                children: [
                  const Text(
                    'Profile',
                    style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold),
                  ),
                  const SizedBox(height: 6),
                  const Text(
                    'Ultra private build in progress',
                    style: TextStyle(color: Colors.white70),
                  ),
                  const SizedBox(height: 16),
                  _infoCard('Goal', 'Weight loss and workout consistency'),
                  _infoCard('Workout Engine', 'Active'),
                  _infoCard('Exercise Catalog', '200+ exercises'),
                  _infoCard('Collections', '100 workout bundles'),
                  _infoCard('Timer System', 'Running'),
                  _infoCard('Human Trainer', 'Enabled'),
                ],
              );
            }

            Widget _infoCard(String title, String value) {
              return Container(
                margin: const EdgeInsets.only(bottom: 12),
                padding: const EdgeInsets.all(16),
                decoration: BoxDecoration(
                  color: const Color(0xFF171717),
                  borderRadius: BorderRadius.circular(20),
                  border: Border.all(color: const Color(0x2239FF14)),
                ),
                child: Row(
                  mainAxisAlignment: MainAxisAlignment.spaceBetween,
                  children: [
                    Text(title, style: const TextStyle(fontWeight: FontWeight.bold)),
                    Text(value, style: const TextStyle(color: Colors.white70)),
                  ],
                ),
              );
            }
          }

          class _Template {
            final String baseName;
            final String description;
            final ExerciseCategory category;
            final List<String> muscles;
            final int calories;

            const _Template({
              required this.baseName,
              required this.description,
              required this.category,
              required this.muscles,
              required this.calories,
            });
          }

          class _Variation {
            final String suffix;
            final ExerciseDifficulty difficulty;
            final int durationSeconds;
            final double multiplier;

            const _Variation({
              required this.suffix,
              required this.difficulty,
              required this.durationSeconds,
              required this.multiplier,
            });
          }
          EOF

