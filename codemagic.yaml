workflows:
  android-build:
    name: Trink Android Build
    max_build_duration: 30
    environment:
      flutter: stable

    scripts:
      - name: Create clean Flutter app
        script: |
          flutter create trink_app --platforms=android --project-name trink_weight_loss --org com.trink.weightloss

      - name: Replace main.dart with Trink app
        script: |
          cd trink_app
          cat > lib/main.dart <<'EOF'
          import 'package:flutter/material.dart';

          void main() {
            runApp(const TrinkApp());
          }

          class TrinkApp extends StatelessWidget {
            const TrinkApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                title: 'Trink Weight Loss',
                theme: ThemeData(
                  brightness: Brightness.dark,
                  scaffoldBackgroundColor: const Color(0xFF0B0B0B),
                  colorScheme: const ColorScheme.dark(
                    primary: Color(0xFF39FF14),
                    secondary: Color(0xFF39FF14),
                    surface: Color(0xFF171717),
                  ),
                  useMaterial3: true,
                ),
                home: const MainShell(),
              );
            }
          }

          class MainShell extends StatefulWidget {
            const MainShell({super.key});

            @override
            State<MainShell> createState() => _MainShellState();
          }

          class _MainShellState extends State<MainShell> {
            int index = 0;
            double water = 1.2;
            double waterGoal = 2.5;
            double weight = 78.4;
            double targetWeight = 72.0;
            final List<double> history = [80.2, 79.6, 79.0, 78.4];

            @override
            Widget build(BuildContext context) {
              final pages = [
                HomePage(
                  water: water,
                  waterGoal: waterGoal,
                  weight: weight,
                  targetWeight: targetWeight,
                ),
                WaterPage(
                  water: water,
                  waterGoal: waterGoal,
                  onAdd: (value) => setState(() => water += value),
                ),
                WeightPage(
                  weight: weight,
                  targetWeight: targetWeight,
                  history: history,
                  onSave: (value) => setState(() {
                    weight = value;
                    history.add(value);
                  }),
                ),
                const WorkoutPage(),
                ProfilePage(
                  weight: weight,
                  targetWeight: targetWeight,
                  waterGoal: waterGoal,
                ),
              ];

              return Scaffold(
                body: SafeArea(child: pages[index]),
                bottomNavigationBar: NavigationBar(
                  selectedIndex: index,
                  backgroundColor: const Color(0xFF111111),
                  indicatorColor: const Color(0x2239FF14),
                  onDestinationSelected: (value) => setState(() => index = value),
                  destinations: const [
                    NavigationDestination(
                      icon: Icon(Icons.home_outlined),
                      selectedIcon: Icon(Icons.home),
                      label: 'Home',
                    ),
                    NavigationDestination(
                      icon: Icon(Icons.water_drop_outlined),
                      selectedIcon: Icon(Icons.water_drop),
                      label: 'Water',
                    ),
                    NavigationDestination(
                      icon: Icon(Icons.monitor_weight_outlined),
                      selectedIcon: Icon(Icons.monitor_weight),
                      label: 'Weight',
                    ),
                    NavigationDestination(
                      icon: Icon(Icons.fitness_center_outlined),
                      selectedIcon: Icon(Icons.fitness_center),
                      label: 'Workout',
                    ),
                    NavigationDestination(
                      icon: Icon(Icons.person_outline),
                      selectedIcon: Icon(Icons.person),
                      label: 'Profile',
                    ),
                  ],
                ),
              );
            }
          }

          class HomePage extends StatelessWidget {
            final double water;
            final double waterGoal;
            final double weight;
            final double targetWeight;

            const HomePage({
              super.key,
              required this.water,
              required this.waterGoal,
              required this.weight,
              required this.targetWeight,
            });

            @override
            Widget build(BuildContext context) {
              return ListView(
                padding: const EdgeInsets.all(16),
                children: [
                  const Text(
                    'Trink Weight Loss',
                    style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold),
                  ),
                  const SizedBox(height: 6),
                  const Text(
                    'Professional fitness, water and weight tracker',
                    style: TextStyle(color: Colors.white70),
                  ),
                  const SizedBox(height: 18),
                  buildCard(
                    child: Row(
                      children: [
                        const CircleAvatar(
                          radius: 26,
                          backgroundColor: Color(0x2239FF14),
                          child: Icon(Icons.fitness_center, color: Color(0xFF39FF14)),
                        ),
                        const SizedBox(width: 12),
                        Expanded(
                          child: Column(
                            crossAxisAlignment: CrossAxisAlignment.start,
                            children: [
                              const Text('Goal', style: TextStyle(color: Colors.white70)),
                              Text(
                                '${(weight - targetWeight).toStringAsFixed(1)} kg remaining',
                                style: const TextStyle(fontSize: 20, fontWeight: FontWeight.bold),
                              ),
                            ],
                          ),
                        ),
                      ],
                    ),
                  ),
                  const SizedBox(height: 12),
                  Row(
                    children: [
                      Expanded(
                        child: buildStatCard(
                          icon: Icons.water_drop,
                          title: 'Water',
                          value: '${water.toStringAsFixed(1)} / ${waterGoal.toStringAsFixed(1)} L',
                        ),
                      ),
                      const SizedBox(width: 12),
                      Expanded(
                        child: buildStatCard(
                          icon: Icons.monitor_weight,
                          title: 'Weight',
                          value: '${weight.toStringAsFixed(1)} kg',
                        ),
                      ),
                    ],
                  ),
                  const SizedBox(height: 18),
                  buildTile(Icons.local_fire_department, 'Fat Burn Workout', '18 min HIIT'),
                  buildTile(Icons.restaurant_menu, 'Nutrition Focus', 'Balanced hydration + protein'),
                  buildTile(Icons.show_chart, 'Progress', 'Track results daily'),
                ],
              );
            }
          }

          class WaterPage extends StatelessWidget {
            final double water;
            final double waterGoal;
            final ValueChanged<double> onAdd;

            const WaterPage({
              super.key,
              required this.water,
              required this.waterGoal,
              required this.onAdd,
            });

            @override
            Widget build(BuildContext context) {
              final progress = (water / waterGoal).clamp(0.0, 1.0);
              return ListView(
                padding: const EdgeInsets.all(16),
                children: [
                  const Text(
                    'Water Tracker',
                    style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold),
                  ),
                  const SizedBox(height: 16),
                  buildCard(
                    child: Column(
                      children: [
                        const Icon(Icons.water_drop, size: 54, color: Color(0xFF39FF14)),
                        const SizedBox(height: 12),
                        Text(
                          '${water.toStringAsFixed(1)} L',
                          style: const TextStyle(fontSize: 34, fontWeight: FontWeight.bold),
                        ),
                        Text(
                          'Goal: ${waterGoal.toStringAsFixed(1)} L',
                          style: const TextStyle(color: Colors.white70),
                        ),
                        const SizedBox(height: 16),
                        LinearProgressIndicator(
                          value: progress,
                          minHeight: 10,
                          borderRadius: BorderRadius.circular(20),
                          backgroundColor: Colors.white12,
                          color: const Color(0xFF39FF14),
                        ),
                      ],
                    ),
                  ),
                  const SizedBox(height: 16),
                  Wrap(
                    spacing: 10,
                    runSpacing: 10,
                    children: [
                      buildQuickButton('+ 0.25 L', () => onAdd(0.25)),
                      buildQuickButton('+ 0.50 L', () => onAdd(0.50)),
                      buildQuickButton('+ 0.75 L', () => onAdd(0.75)),
                      buildQuickButton('+ 1.00 L', () => onAdd(1.00)),
                    ],
                  ),
                ],
              );
            }
          }

          class WeightPage extends StatelessWidget {
            final double weight;
            final double targetWeight;
            final List<double> history;
            final ValueChanged<double> onSave;

            const WeightPage({
              super.key,
              required this.weight,
              required this.targetWeight,
              required this.history,
              required this.onSave,
            });

            @override
            Widget build(BuildContext context) {
              final controller = TextEditingController();

              return ListView(
                padding: const EdgeInsets.all(16),
                children: [
                  const Text(
                    'Weight Tracker',
                    style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold),
                  ),
                  const SizedBox(height: 12),
                  Row(
                    children: [
                      Expanded(child: buildSmallCard('Current', '${weight.toStringAsFixed(1)} kg')),
                      const SizedBox(width: 12),
                      Expanded(child: buildSmallCard('Target', '${targetWeight.toStringAsFixed(1)} kg')),
                    ],
                  ),
                  const SizedBox(height: 16),
                  buildCard(
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      children: [
                        const Text(
                          'Add new weight',
                          style: TextStyle(fontSize: 18, fontWeight: FontWeight.bold),
                        ),
                        const SizedBox(height: 12),
                        TextField(
                          controller: controller,
                          keyboardType: const TextInputType.numberWithOptions(decimal: true),
                          decoration: const InputDecoration(
                            hintText: 'Enter weight in kg',
                            filled: true,
                            fillColor: Color(0xFF101010),
                            border: OutlineInputBorder(),
                          ),
                        ),
                        const SizedBox(height: 12),
                        SizedBox(
                          width: double.infinity,
                          child: FilledButton(
                            style: FilledButton.styleFrom(
                              backgroundColor: const Color(0xFF39FF14),
                              foregroundColor: Colors.black,
                            ),
                            onPressed: () {
                              final value = double.tryParse(controller.text.trim());
                              if (value != null) {
                                onSave(value);
                                ScaffoldMessenger.of(context).showSnackBar(
                                  SnackBar(content: Text('Weight updated: ${value.toStringAsFixed(1)} kg')),
                                );
                              }
                            },
                            child: const Text('Save Weight'),
                          ),
                        ),
                      ],
                    ),
                  ),
                  const SizedBox(height: 16),
                  const Text(
                    'History',
                    style: TextStyle(fontSize: 20, fontWeight: FontWeight.bold),
                  ),
                  const SizedBox(height: 10),
                  ...history.reversed.map(
                    (item) => Padding(
                      padding: const EdgeInsets.only(bottom: 10),
                      child: buildCard(
                        child: Row(
                          mainAxisAlignment: MainAxisAlignment.spaceBetween,
                          children: [
                            const Text('Logged weight'),
                            Text(
                              '${item.toStringAsFixed(1)} kg',
                              style: const TextStyle(
                                color: Color(0xFF39FF14),
                                fontWeight: FontWeight.bold,
                              ),
                            ),
                          ],
                        ),
                      ),
                    ),
                  ),
                ],
              );
            }
          }

          class WorkoutPage extends StatelessWidget {
            const WorkoutPage({super.key});

            @override
            Widget build(BuildContext context) {
              const items = [
                ['Fat Burn HIIT', '18 min • 220 kcal'],
                ['Abs Core Blast', '12 min • 120 kcal'],
                ['Full Body Home', '25 min • 260 kcal'],
                ['Morning Walk', '30 min • 150 kcal'],
              ];

              return ListView(
                padding: const EdgeInsets.all(16),
                children: [
                  const Text(
                    'Workout',
                    style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold),
                  ),
                  const SizedBox(height: 16),
                  for (final item in items)
                    Padding(
                      padding: const EdgeInsets.only(bottom: 12),
                      child: buildCard(
                        child: Row(
                          children: [
                            const CircleAvatar(
                              radius: 24,
                              backgroundColor: Color(0x2239FF14),
                              child: Icon(Icons.fitness_center, color: Color(0xFF39FF14)),
                            ),
                            const SizedBox(width: 12),
                            Expanded(
                              child: Column(
                                crossAxisAlignment: CrossAxisAlignment.start,
                                children: [
                                  Text(item[0], style: const TextStyle(fontWeight: FontWeight.bold, fontSize: 16)),
                                  const SizedBox(height: 4),
                                  Text(item[1], style: const TextStyle(color: Colors.white70)),
                                ],
                              ),
                            ),
                            const Icon(Icons.chevron_right, color: Colors.white54),
                          ],
                        ),
                      ),
                    ),
                ],
              );
            }
          }

          class ProfilePage extends StatelessWidget {
            final double weight;
            final double targetWeight;
            final double waterGoal;

            const ProfilePage({
              super.key,
              required this.weight,
              required this.targetWeight,
              required this.waterGoal,
            });

            @override
            Widget build(BuildContext context) {
              return ListView(
                padding: const EdgeInsets.all(16),
                children: [
                  const Text(
                    'Profile',
                    style: TextStyle(fontSize: 28, fontWeight: FontWeight.bold),
                  ),
                  const SizedBox(height: 16),
                  buildCard(
                    child: const Row(
                      children: [
                        CircleAvatar(
                          radius: 28,
                          backgroundColor: Color(0x2239FF14),
                          child: Icon(Icons.person, color: Color(0xFF39FF14), size: 30),
                        ),
                        SizedBox(width: 12),
                        Column(
                          crossAxisAlignment: CrossAxisAlignment.start,
                          children: [
                            Text(
                              'Trink User',
                              style: TextStyle(fontSize: 18, fontWeight: FontWeight.bold),
                            ),
                            Text(
                              'Weight loss focus',
                              style: TextStyle(color: Colors.white70),
                            ),
                          ],
                        ),
                      ],
                    ),
                  ),
                  const SizedBox(height: 16),
                  buildSettingRow(Icons.flag, 'Target weight', '${targetWeight.toStringAsFixed(1)} kg'),
                  buildSettingRow(Icons.monitor_weight, 'Current weight', '${weight.toStringAsFixed(1)} kg'),
                  buildSettingRow(Icons.water_drop, 'Daily water goal', '${waterGoal.toStringAsFixed(1)} L'),
                  buildSettingRow(Icons.language, 'Language', 'Global ready'),
                ],
              );
            }
          }

          Widget buildCard({required Widget child}) {
            return Container(
              padding: const EdgeInsets.all(16),
              decoration: BoxDecoration(
                color: const Color(0xFF171717),
                borderRadius: BorderRadius.circular(22),
                border: Border.all(color: const Color(0x2239FF14)),
              ),
              child: child,
            );
          }

          Widget buildStatCard({
            required IconData icon,
            required String title,
            required String value,
          }) {
            return buildCard(
              child: Column(
                crossAxisAlignment: CrossAxisAlignment.start,
                children: [
                  Icon(icon, color: const Color(0xFF39FF14)),
                  const SizedBox(height: 10),
                  Text(title, style: const TextStyle(color: Colors.white70)),
                  const SizedBox(height: 4),
                  Text(
                    value,
                    style: const TextStyle(fontSize: 18, fontWeight: FontWeight.bold),
                  ),
                ],
              ),
            );
          }

          Widget buildTile(IconData icon, String title, String subtitle) {
            return Padding(
              padding: const EdgeInsets.only(bottom: 12),
              child: buildCard(
                child: Row(
                  children: [
                    CircleAvatar(
                      radius: 22,
                      backgroundColor: const Color(0x2239FF14),
                      child: Icon(icon, color: const Color(0xFF39FF14)),
                    ),
                    const SizedBox(width: 12),
                    Expanded(
                      child: Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Text(
                            title,
                            style: const TextStyle(fontSize: 16, fontWeight: FontWeight.bold),
                          ),
                          const SizedBox(height: 4),
                          Text(subtitle, style: const TextStyle(color: Colors.white70)),
                        ],
                      ),
                    ),
                  ],
                ),
              ),
            );
          }

          Widget buildQuickButton(String label, VoidCallback onPressed) {
            return FilledButton(
              style: FilledButton.styleFrom(
                backgroundColor: const Color(0xFF39FF14),
                foregroundColor: Colors.black,
              ),
              onPressed: onPressed,
              child: Text(label),
            );
          }

          Widget buildSmallCard(String title, String value) {
            return buildCard(
              child: Column(
                crossAxisAlignment: CrossAxisAlignment.start,
                children: [
                  Text(title, style: const TextStyle(color: Colors.white70)),
                  const SizedBox(height: 4),
                  Text(
                    value,
                    style: const TextStyle(fontSize: 20, fontWeight: FontWeight.bold),
                  ),
                ],
              ),
            );
          }

          Widget buildSettingRow(IconData icon, String title, String value) {
            return Padding(
              padding: const EdgeInsets.only(bottom: 12),
              child: buildCard(
                child: Row(
                  children: [
                    Icon(icon, color: const Color(0xFF39FF14)),
                    const SizedBox(width: 12),
                    Expanded(
                      child: Text(
                        title,
                        style: const TextStyle(fontWeight: FontWeight.w600),
                      ),
                    ),
                    Text(value, style: const TextStyle(color: Colors.white70)),
                  ],
                ),
              ),
            );
          }
          EOF

      - name: Get dependencies
        script: |
          cd trink_app
          flutter pub get

      - name: Build APK
        script: |
          cd trink_app
          flutter build apk --release

    artifacts:
      - trink_app/build/**/outputs/**/*.apk
